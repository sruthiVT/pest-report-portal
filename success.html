<!DOCTYPE html>
<html>
<head>
<title>Submission Successful</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("https://images.unsplash.com/photo-1500382017468-9049fed747ef") no-repeat center center/cover;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:420px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.3);
text-align:center;
}

h2{
color:green;
}

p{
font-size:16px;
margin-top:10px;
}

button{
margin-top:20px;
padding:12px;
width:100%;
background:green;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#006400;
}

</style>

</head>

<body>

<div class="container">

<h2 id="successTitle">✅ Report Submitted Successfully</h2>

<p id="successMsg">
Your pest complaint has been sent to the agriculture officer.
You will receive suggestions soon.
</p>

<button id="backBtn">Thank You</button>

</div>

<script>

/* LANGUAGE SUPPORT */

const lang = localStorage.getItem("farmerLanguage") || "english";

if(lang === "tamil"){

document.getElementById("successTitle").innerText =
"✅ புகார் வெற்றிகரமாக பதிவு செய்யப்பட்டது";

document.getElementById("successMsg").innerText =
"உங்கள் பூச்சி புகார் விவசாய அலுவலருக்கு அனுப்பப்பட்டுள்ளது. விரைவில் பரிந்துரைகள் கிடைக்கும்.";

document.getElementById("backBtn").innerText="நன்றி";

}

/* RETURN TO LOGIN */

document.getElementById("backBtn").onclick=function(){

window.location.href="login.html";

}

</script>

</body>
</html>
