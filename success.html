<!DOCTYPE html>
<html>
<head>

<title>Report Submitted</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
padding:60px;
}

.container{
background:white;
width:420px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
background:green;
color:white;
padding:12px;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2 id="successTitle">✅ Report Submitted Successfully</h2>

<p id="successMsg">Your pest complaint has been registered.</p>

<p id="successMsg2">An agriculture officer will review your report.</p>

<br>

<button id="homeBtn" onclick="window.location.href='index.html'">
Back to Home
</button>

</div>

<script>

window.onload=function(){

let lang=localStorage.getItem("farmerLanguage");

if(lang=="tamil"){

document.getElementById("successTitle").innerHTML="✅ புகார் வெற்றிகரமாக சமர்ப்பிக்கப்பட்டது";
document.getElementById("successMsg").innerHTML="உங்கள் பூச்சி புகார் பதிவு செய்யப்பட்டது.";
document.getElementById("successMsg2").innerHTML="வேளாண்மை அதிகாரி உங்கள் புகாரை ஆய்வு செய்வார்.";
document.getElementById("homeBtn").innerHTML="முகப்புக்கு திரும்ப";

}

}

</script>

</body>
</html>
