<!DOCTYPE html>
<html>
<head>
<title>Farmer Dashboard</title>

<style>

body{
font-family:Arial;
margin:0;
padding:0;
background:url("https://images.unsplash.com/photo-1500382017468-9049fed747ef") no-repeat center center/cover;
background-size:cover;
min-height:100vh;
}

/* HEADER */

.header{
background:white;
padding:15px 40px;
display:flex;
align-items:center;
justify-content:space-between;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* LOGO */

.logoBox{
display:flex;
align-items:center;
gap:10px;
}

.logoBox img{
width:35px;
}

.logoText{
font-size:22px;
font-weight:bold;
color:#ff5722;
}

.logoText span{
display:block;
font-size:13px;
color:green;
}

/* NAVIGATION TABS */

.navbar{
display:flex;
gap:30px;
font-weight:600;
}

.navbar button{
background:none;
border:none;
font-size:15px;
cursor:pointer;
padding:10px 5px;
}

.navbar button.active{
color:green;
border-bottom:3px solid green;
}

/* SECTIONS */

.section{
display:none;
}

.section.active{
display:block;
}

/* CARD CONTAINER */

.container{
width:90%;
max-width:1100px;
margin:40px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 20px rgba(0,0,0,0.25);
overflow-x:auto;
}

/* TITLES */

h1{
text-align:center;
color:#2e7d32;
margin-bottom:20px;
}

/* BUTTON */

.reportBtn{
padding:12px 20px;
background:green;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ccc;
padding:10px;
text-align:left;
}

th{
background:green;
color:white;
}

.status{
font-weight:bold;
}

.resolved{
color:green;
}

.pending{
color:red;
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

<div class="logoBox">
<img src="https://cdn-icons-png.flaticon.com/512/415/415733.png">

<div class="logoText">
SMART MONITORING PEST SYSTEM
<span>Agriculture Department</span>
</div>
</div>

<!-- NAVIGATION -->

<div class="navbar">

<button id="reportTab" class="active" onclick="showSection('report')">
Pest Report
</button>

<button id="suggestionTab" onclick="showSection('suggestion')">
Farmer Suggestions
</button>

</div>

</div>


<!-- PEST REPORT SECTION -->

<div id="report" class="section active container">

<h1>Submit Pest Report</h1>

<p>Click below to submit a pest complaint.</p>

<button class="reportBtn" onclick="goReport()">
Submit Pest Report
</button>

</div>


<!-- FARMER SUGGESTIONS -->

<div id="suggestion" class="section container">

<h1>🌾 Officer Suggestions</h1>

<table id="casesTable">

<thead>
<tr>
<th>Crop</th>
<th>Pest Type</th>
<th>Problem</th>
<th>Status</th>
<th>Officer Suggestion</th>
<th>Treatment Procedure</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>


<script>

/* LOAD CASES */

const tableBody=document.querySelector("#casesTable tbody");

let cases=JSON.parse(localStorage.getItem("cases")) || [];

function renderCases(){

tableBody.innerHTML="";

if(cases.length===0) return;

let c=cases[cases.length-1];

let statusClass=c.status==="Resolved" ? "resolved" : "pending";

let row=document.createElement("tr");

row.innerHTML=`
<td>${c.crop || ""}</td>
<td>${c.pestType || ""}</td>
<td>${c.problem || ""}</td>
<td class="status ${statusClass}">${c.status || "Pending"}</td>
<td>${c.suggestion || "Waiting for officer response"}</td>
<td>${c.procedure || "Waiting for officer response"}</td>
`;

tableBody.appendChild(row);

}

renderCases();


/* TAB SWITCH */

function showSection(section){

document.querySelectorAll(".section").forEach(s=>{
s.classList.remove("active");
});

document.querySelectorAll(".navbar button").forEach(b=>{
b.classList.remove("active");
});

document.getElementById(section).classList.add("active");

if(section==="report"){
document.getElementById("reportTab").classList.add("active");
}else{
document.getElementById("suggestionTab").classList.add("active");
}

}


/* GO REPORT PAGE */

function goReport(){
window.location.href="report.html";
}

</script>

</body>
</html>
