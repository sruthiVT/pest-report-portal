<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Farmer Suggestions</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

/* HEADER */

.header{
background:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.nav button{
background:#2d7ef7;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
}

/* TABLE */

.container{
padding:30px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#2d7ef7;
color:white;
}

img{
width:80px;
border-radius:5px;
}

textarea{
width:100%;
}

</style>

</head>

<body>

<div class="header">
<h2>🌾 Farmer Submitted Cases</h2>
<div class="nav">
<button onclick="goBack()">Back</button>
</div>
</div>

<div class="container">

<table>

<thead>
<tr>
<th>Village</th>
<th>Crop</th>
<th>Pest</th>
<th>Level</th>
<th>Problem</th>
<th>Image</th>
<th>Officer Suggestion</th>
<th>Status</th>
</tr>
</thead>

<tbody id="tableData"></tbody>

</table>

</div>

<script>

/* LOAD DATA */

function loadCases(){

let cases = JSON.parse(localStorage.getItem("cases")) || [];

let table="";

cases.forEach((c,index)=>{

table += `
<tr>
<td>${c.village}</td>
<td>${c.crop}</td>
<td>${c.pestType}</td>
<td>${c.level}</td>
<td>${c.problem}</td>
<td><img src="${c.image}"></td>

<td>
<textarea onchange="saveSuggestion(${index}, this.value)">
${c.suggestion || ""}
</textarea>
</td>

<td>${c.status}</td>

</tr>
`;

});

document.getElementById("tableData").innerHTML=table;

}

/* SAVE OFFICER SUGGESTION */

function saveSuggestion(index,value){

let cases = JSON.parse(localStorage.getItem("cases"));

cases[index].suggestion = value;
cases[index].status = "Reviewed";

localStorage.setItem("cases",JSON.stringify(cases));

alert("Suggestion saved");

}

/* BACK BUTTON */

function goBack(){
window.location.href="pestreport.html";
}

/* AUTO LOAD */

loadCases();

</script>

</body>
</html>
