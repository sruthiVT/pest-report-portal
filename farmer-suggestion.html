<!DOCTYPE html>
<html>
<head>
<title>Farmer Suggestions</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("https://images.unsplash.com/photo-1500382017468-9049fed747ef") no-repeat center center/cover;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
width:90%;
max-width:1100px;
padding:25px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,0.2);
}

h2{
text-align:center;
color:#2e7d32;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ccc;
padding:10px;
text-align:center;
}

th{
background:#f5f5f5;
}

button{
margin-top:20px;
padding:10px 20px;
background:green;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
float:right;
}

</style>
</head>

<body>

<div class="container">

<h2>🌾 Your Submitted Cases</h2>

<table id="casesTable">

<tr>
<th>Village</th>
<th>Crop</th>
<th>Pest Type</th>
<th>Level</th>
<th>Problem</th>
<th>Status</th>
</tr>

</table>

<button onclick="finish()">Submit & Finish</button>

</div>

<script>

let cases = JSON.parse(localStorage.getItem("cases")) || [];

let table = document.getElementById("casesTable");

cases.forEach(function(c){

let row = table.insertRow();

row.insertCell(0).innerText = c.village;
row.insertCell(1).innerText = c.crop;
row.insertCell(2).innerText = c.pestType;
row.insertCell(3).innerText = c.level;
row.insertCell(4).innerText = c.problem;
row.insertCell(5).innerText = c.status;

});

function finish(){
window.location.href="success.html";
}

</script>

</body>
</html>
