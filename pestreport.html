<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Smart Monitoring Pest System</title>

<style>

body{
margin:0;
font-family:Arial;
}

/* HEADER */

.header{
background:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.logoBox{
display:flex;
align-items:center;
gap:10px;
}

.logoBox img{
width:35px;
}

.logoText{
font-size:24px;
font-weight:bold;
color:#ff5722;
}

.logoText span{
display:block;
font-size:14px;
color:green;
}

.nav{
display:flex;
gap:10px;
}

.nav button{
background:#2d7ef7;
color:white;
border:none;
padding:10px 18px;
border-radius:6px;
font-size:15px;
cursor:pointer;
}

/* BACKGROUND */

.hero{
background:url("https://images.unsplash.com/photo-1500382017468-9049fed747ef") no-repeat center center/cover;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* FORM */

.container{
width:340px;
background:white;
padding:18px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
display:none;
}

h2{
text-align:center;
}

input,select,textarea{
width:100%;
padding:8px;
margin:6px 0;
border-radius:5px;
border:1px solid #ccc;
}

.submitBtn{
width:100%;
padding:10px;
background:green;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.pestInfo{
color:green;
font-weight:bold;
}

</style>

</head>

<body>

<div class="header">

<div class="logoBox">
<img src="https://cdn-icons-png.flaticon.com/512/415/415733.png">
<div class="logoText">
SMART MONITORING PEST SYSTEM
<span>Agriculture Department</span>
</div>
</div>

<div class="nav">
<button onclick="goSuggestion()">Farmer Suggestion</button>
<button onclick="openReport()">Pest Report</button>
</div>

</div>

<div class="hero">

<div class="container" id="reportContainer">

<h2>🌾 Farmer Pest Report</h2>

<form onsubmit="submitReport(event)">

<label>Village</label>
<select id="village">
<option>Pollachi</option>
<option>Udumalpet</option>
<option>Avinashi</option>
<option>Tiruppur</option>
</select>

<label>Crop</label>
<select id="crop">
<option>Paddy</option>
<option>Maize</option>
<option>Cotton</option>
<option>Groundnut</option>
</select>

<label>Pest Type</label>
<select id="pestType" onchange="showPestInfo()">
<option>Leaf Folder</option>
<option>Stem Borer</option>
<option>Brown Plant Hopper</option>
<option>Armyworm</option>
</select>

<p id="pestDescription" class="pestInfo"></p>

<label>Level</label>
<select id="level">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<label>Description</label>
<textarea id="description"></textarea>

<button class="submitBtn">Submit Report</button>

</form>

</div>

</div>

<script>

function openReport(){
document.getElementById("reportContainer").style.display="block";
}

function goSuggestion(){
window.location.href="farmer-suggestion.html";
}

function showPestInfo(){

let pest=document.getElementById("pestType").value;
let text="";

if(pest=="Leaf Folder")
text="Damages rice leaves by folding them.";

else if(pest=="Stem Borer")
text="Bores inside crop stems.";

else if(pest=="Brown Plant Hopper")
text="Sucks sap from rice plants.";

else if(pest=="Armyworm")
text="Consumes leaves quickly.";

document.getElementById("pestDescription").innerText=text;

}

function submitReport(e){

e.preventDefault();

let cases = JSON.parse(localStorage.getItem("cases")) || [];

let newCase={
village:document.getElementById("village").value,
crop:document.getElementById("crop").value,
pestType:document.getElementById("pestType").value,
level:document.getElementById("level").value,
problem:document.getElementById("description").value,
status:"Pending"
};

cases.push(newCase);

localStorage.setItem("cases",JSON.stringify(cases));

window.location.href="success.html";

}

</script>

</body>
</html>
