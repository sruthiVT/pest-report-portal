<!DOCTYPE html>
<html>
<head>
<title>Pest Report</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:url("https://images.unsplash.com/photo-1500382017468-9049fed747ef") no-repeat center center/cover;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  width:400px;
  background:white;
  padding:30px;
  border-radius:10px;
  box-shadow:0 0 15px rgba(0,0,0,0.3);
  text-align:center;
}

input, textarea, button{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:5px;
  border:1px solid #ccc;
}

textarea{
  height:100px;
  resize:none;
}

button{
  background:green;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#006400;
}
</style>
</head>
<body>

<div class="container">
<h2>🌾 Pest Report</h2>
<input id="crop" placeholder="Crop Name" required>
<textarea id="problem" placeholder="Describe Pest Problem" required></textarea>
<button onclick="submitPestReport()">Submit & Review</button>
</div>

<script>
function submitPestReport(){
  const name = localStorage.getItem("farmerName");
  const email = localStorage.getItem("farmerEmail");
  const phone = localStorage.getItem("farmerPhone");

  const crop = document.getElementById("crop").value;
  const problem = document.getElementById("problem").value;

  if(!crop || !problem){
    alert("Please fill all fields!");
    return;
  }

  let cases = JSON.parse(localStorage.getItem("cases")) || [];
  cases.push({
    name, email, phone, crop, problem, status:"Pending", suggestion:""
  });
  localStorage.setItem("cases", JSON.stringify(cases));

  // Redirect to farmer dashboard to review
  window.location.href = "farmercases.html";
}
</script>

</body>
</html>
