<!DOCTYPE html>
<html lang="en">
<head>
<title>Pest Report</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:url("https://images.unsplash.com/photo-1500382017468-9049fed747ef") no-repeat center center/cover;
  background-size:cover;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.container{
  width:420px;
  background:white;
  padding:30px;
  border-radius:10px;
  box-shadow:0 0 15px rgba(0,0,0,0.3);
  text-align:center;
}
input, select, textarea, button{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:5px;
  border:1px solid #ccc;
  font-size:14px;
}
textarea{
  height:100px;
  resize:none;
}
button{
  background:green;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
button:hover{
  background:#006400;
}
</style>

<!-- EmailJS SDK -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
  // **CRT EmailJS Initialization**
  // Replace with your EmailJS Public Key
  emailjs.init("3oTB5lj9pKw_10I6R");
</script>
</head>
<body>

<div class="container">
<h2 id="title">🌾 Pest Report</h2>

<select id="village"></select>
<select id="crop"></select>
<select id="pestType"></select>
<select id="cultivatedPeriod"></select>
<select id="infectedLevel"></select>

<textarea id="problem" placeholder="Describe Pest Problem"></textarea>
<input type="file" id="imageFile" accept="image/*">

<button onclick="submitPestReport()">Submit & Review</button>
</div>

<script>
// Language
const lang = localStorage.getItem("farmerLanguage") || "english";

// Dropdowns
const villages = ["Pollachi","Udumalpet","Kinathukadavu","Valparai","Perundurai"];
const crops = ["Paddy (Rice)","Maize","Ragi","Sorghum","Sugarcane"];
const pestTypes = ["Leaf Folder","Stem Borer","Brown Plant Hopper","Armyworm","Aphids"];
const periods = ["0 - 30 Days","30 - 60 Days","60 - 90 Days","90 - 120 Days","120+ Days"];
const levels = ["Low","Medium","High"];

// Language translations
const translations = {
  english:{
    village:"Select Village",
    crop:"Select Crop",
    pestType:"Select Pest Type",
    period:"Select Cultivated Period",
    level:"Select Infection Level",
    problem:"Describe Pest Problem",
    submit:"Submit & Review",
    fillFields:"Please fill all fields!",
    imgFail:"Image upload failed. Try again.",
    emailFail:"Email sending failed. Try again."
  },
  tamil:{
    village:"ஊரை தேர்வு செய்க",
    crop:"பயிரை தேர்வு செய்க",
    pestType:"பூச்சி வகை தேர்வு செய்க",
    period:"பயிர் வளர்ச்சி காலம் தேர்வு செய்க",
    level:"பாதிப்பு நிலை தேர்வு செய்க",
    problem:"பூச்சி பிரச்சனை விவரிக்கவும்",
    submit:"சமர்ப்பிக்கவும்",
    fillFields:"அனைத்து பகுதிகளையும் நிரப்பவும்!",
    imgFail:"படத்தை பதிவேற்ற முடியவில்லை. மீண்டும் முயற்சிக்கவும்.",
    emailFail:"மின்னஞ்சல் அனுப்ப முடியவில்லை. மீண்டும் முயற்சிக்கவும்."
  }
};

// Fill dropdowns
function fillDropdown(id, options, placeholder){
  const sel = document.getElementById(id);
  sel.innerHTML = `<option value="">${placeholder}</option>`;
  options.forEach(opt => sel.innerHTML += `<option value="${opt}">${opt}</option>`);
}

fillDropdown("village", villages, translations[lang].village);
fillDropdown("crop", crops, translations[lang].crop);
fillDropdown("pestType", pestTypes, translations[lang].pestType);
fillDropdown("cultivatedPeriod", periods, translations[lang].period);
fillDropdown("infectedLevel", levels, translations[lang].level);
document.getElementById("problem").placeholder = translations[lang].problem;
document.querySelector("button").innerText = translations[lang].submit;

// Submit function
async function submitPestReport(){
  const name = localStorage.getItem("userName");
  const email = localStorage.getItem("userEmail");
  const phone = localStorage.getItem("userPhone");

  const village = document.getElementById("village").value;
  const crop = document.getElementById("crop").value;
  const pestType = document.getElementById("pestType").value;
  const period = document.getElementById("cultivatedPeriod").value;
  const level = document.getElementById("infectedLevel").value;
  const problem = document.getElementById("problem").value;
  const file = document.getElementById("imageFile").files[0];

  if(!village||!crop||!pestType||!period||!level||!problem){
    alert(translations[lang].fillFields);
    return;
  }

  let imageUrl = "";

  // Upload to ImgBB
  if(file){
    const formData = new FormData();
    formData.append("image", file);
    const imgbbApiKey = "9d9a3054573db11bcb75e2a3da97e3de"; // Replace with your ImgBB API key
    try{
      const res = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbApiKey}`, {
        method:"POST",
        body: formData
      });
      const data = await res.json();
      imageUrl = data.data.url;
    }catch(err){
      alert(translations[lang].imgFail);
      return;
    }
  }

  // Save locally
  let cases = JSON.parse(localStorage.getItem("cases"))||[];
  cases.push({name,email,phone,village,crop,pestType,period,level,problem,status:"Pending",suggestion:"",image:imageUrl});
  localStorage.setItem("cases", JSON.stringify(cases));

  // Send Email via EmailJS
  emailjs.send("service_5be3jfq","template_f6nyiit",{
    farmer_name: name,
    farmer_email: email,
    phone: phone,
    village: village,
    crop: crop,
    pestType: pestType,
    period: period,
    level: level,
    problem: problem,
    image_url: imageUrl
  }).then(()=>{
    window.location.href="farmercases.html";
  }, (err)=>{
    alert(translations[lang].emailFail);
    console.log(err);
  });
}
</script>

</body>
</html>
