<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Monitoring Pest System</title>

<style>

body{
margin:0;
font-family:Arial;
}

/* HEADER */
.header{
background:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.logoBox{
display:flex;
align-items:center;
gap:10px;
}

.logoBox img{
width:35px;
}

.logoText{
font-size:24px;
font-weight:bold;
color:#ff5722;
}

.logoText span{
display:block;
font-size:14px;
color:green;
}

.nav{
display:flex;
gap:10px;
}

.nav button{
background:#2d7ef7;
color:white;
border:none;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
}

/* BACKGROUND */
.hero{
background:url("https://images.unsplash.com/photo-1500382017468-9049fed747ef") no-repeat center/cover;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* FORM */
.container{
width:420px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}

input,select,textarea{
width:100%;
padding:10px;
margin:6px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:green;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.pestInfo{
color:green;
font-weight:bold;
}

</style>

<!-- EMAILJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
emailjs.init("3oTB5lj9pKw_10I6R");
})();
</script>

</head>

<body>

<!-- HEADER -->
<div class="header">
<div class="logoBox">
<img src="https://cdn-icons-png.flaticon.com/512/415/415733.png">
<div class="logoText">
SMART MONITORING PEST SYSTEM
<span>Agriculture Department</span>
</div>
</div>

<div class="nav">
<button onclick="goSuggestion()">Farmer Suggestion</button>
<button onclick="location.reload()">Pest Report</button>
</div>
</div>

<!-- FORM -->
<div class="hero">
<div class="container">

<h2>🌾 Farmer Pest Report</h2>

<form id="pestForm"
onsubmit="uploadAndSubmit(event)"
method="POST"
action="https://webto.salesforce.com/servlet/servlet.WebToCase?encoding=UTF-8">

<input type="hidden" name="orgid" value="00DdM00000iSfdB">
<input type="hidden" name="retURL"
value="https://sruthivt.github.io/pest-report-portal/success.html">

<input type="hidden" name="suppliedname" id="farmerName">
<input type="hidden" name="suppliedemail" id="farmerEmail">
<input type="hidden" name="suppliedphone" id="farmerPhone">
<input type="hidden" name="Crop_Image_URL__c" id="imageURL">

<label>Village</label>
<select name="Village__c">
<option>Pollachi</option>
<option>Udumalpet</option>
<option>Avinashi</option>
<option>Tiruppur</option>
</select>

<label>Crop</label>
<select name="Product__c">
<option>Paddy</option>
<option>Maize</option>
<option>Cotton</option>
<option>Groundnut</option>
</select>

<label>Pest Type</label>
<select name="subject" id="pestType" onchange="showPestInfo()">
<option>Leaf Folder</option>
<option>Stem Borer</option>
<option>Brown Plant Hopper</option>
<option>Armyworm</option>
</select>

<p id="pestDescription" class="pestInfo"></p>

<label>Level</label>
<select name="Severity_Level__c">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<label>Upload Image</label>
<input type="file" id="imageUpload" required>

<label>Description</label>
<textarea name="description"></textarea>

<button type="submit">Submit Report</button>

</form>

</div>
</div>

<script>

/* NAV */
function goSuggestion(){
window.location.href="farmer-suggestion.html";
}

/* AUTO FILL FARMER DATA */
document.getElementById("farmerName").value = localStorage.getItem("farmerName");
document.getElementById("farmerEmail").value = localStorage.getItem("farmerEmail");
document.getElementById("farmerPhone").value = localStorage.getItem("farmerPhone");

/* PEST INFO */
function showPestInfo(){
let pest=document.getElementById("pestType").value;
let text="";

if(pest=="Leaf Folder")
text="Damages rice leaves.";

else if(pest=="Stem Borer")
text="Bores stems.";

else if(pest=="Brown Plant Hopper")
text="Sucks sap.";

else if(pest=="Armyworm")
text="Eats leaves.";

document.getElementById("pestDescription").innerText=text;
}

/* MAIN FUNCTION */
async function uploadAndSubmit(e){

e.preventDefault();

const file=document.getElementById("imageUpload").files[0];

if(!file){
alert("Upload image");
return;
}

/* IMAGE UPLOAD */
const apiKey="9d9a3054573db11bcb75e2a3da97e3de";

let formData=new FormData();
formData.append("image",file);

let res=await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`,{
method:"POST",
body:formData
});

let data=await res.json();

if(!data.success){
alert("Image upload failed");
return;
}

let imageURL=data.data.url;

/* SET IMAGE URL */
document.getElementById("imageURL").value=imageURL;

/* SAVE LOCAL (for dashboard) */
let cases = JSON.parse(localStorage.getItem("cases")) || [];

let newCase={
village:document.querySelector("[name='Village__c']").value,
crop:document.querySelector("[name='Product__c']").value,
pest:document.querySelector("[name='subject']").value,
level:document.querySelector("[name='Severity_Level__c']").value,
image:imageURL
};

cases.push(newCase);
localStorage.setItem("cases",JSON.stringify(cases));

/* EMAIL SEND */
emailjs.send("service_5be3jfq","template_f6nyiit",{

village:newCase.village,
pest:newCase.pest,
crop:newCase.crop,
level:newCase.level

}).then(function(){

console.log("Email sent");

/* SUBMIT TO SALESFORCE */
document.getElementById("pestForm").submit();

}).catch(function(err){

console.log(err);
alert("Email failed BUT data saved");

/* STILL SUBMIT */
document.getElementById("pestForm").submit();

});

}

</script>

</body>
</html>
