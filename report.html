<!DOCTYPE html>
<html>

<head>

<title>Farmer Pest Report</title>
<meta charset="UTF-8">

<style>

body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
padding:40px;
}

form{
background:white;
padding:25px;
border-radius:10px;
width:420px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,textarea,select{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:green;
color:white;
padding:12px;
border:none;
border-radius:5px;
width:100%;
font-size:16px;
cursor:pointer;
}

</style>

<script>

window.onload=function(){

let lang = localStorage.getItem("farmerLanguage");

if(lang=="tamil"){

document.getElementById("title").innerHTML="🌾 பூச்சி புகார் பதிவு";

document.getElementById("nameLabel").innerHTML="விவசாயி பெயர்";
document.getElementById("emailLabel").innerHTML="மின்னஞ்சல்";
document.getElementById("phoneLabel").innerHTML="தொலைபேசி";
document.getElementById("villageLabel").innerHTML="கிராமம்";
document.getElementById("cropLabel").innerHTML="பயிர் வகை";
document.getElementById("periodLabel").innerHTML="சாகுபடி காலம்";
document.getElementById("pestLabel").innerHTML="பூச்சி வகை";
document.getElementById("infectLabel").innerHTML="பாதிப்பு நிலை";
document.getElementById("descLabel").innerHTML="விவரம்";
document.getElementById("submitBtn").innerHTML="புகார் சமர்ப்பிக்க";

}

}

</script>

</head>

<body>

<h2 id="title">🌾 Farmer Pest Report</h2>

<form action="https://webto.salesforce.com/servlet/servlet.WebToCase?encoding=UTF-8&orgId=00DdM00000iSfdB" method="POST">

<input type="hidden" name="orgid" value="00DdM00000iSfdB">
<input type="hidden" name="retURL" value="https://sruthivt.github.io/pest-report-portal/success.html">
<input type="hidden" name="origin" value="Web">

<label id="nameLabel">Farmer Name</label>
<input type="text" name="name" required>

<label id="emailLabel">Email</label>
<input type="email" name="email" required>

<label id="phoneLabel">Phone</label>
<input type="text" name="phone" required>

<label id="villageLabel">Village</label>

<select name="description">

<option>Select Village</option>

<option>Pollachi</option>

<option>Kinathukadavu</option>
<option>Valparai</option>
<option>Perundurai</option>

<option>Bhavani</option>
<option>Anthiyur</option>
<option>Nambiyur</option>
<option>Kodumudi</option>
<option>Avinashi</option>
<option>Tiruppur</option>
<option>Dharapuram</option>
<option>Kangeyam</option>
<option>Palladam</option>
<option>Thanjavur</option>
<option>Kumbakonam</option>
<option>Orathanadu</option>
<option>Pattukkottai</option>
<option>Mayiladuthurai</option>
<option>Sirkazhi</option>
<option>Nagapattinam</option>
<option>Velankanni</option>
<option>Cuddalore</option>
<option>Panruti</option>
<option>Chidambaram</option>
<option>Villupuram</option>
<option>Tindivanam</option>
<option>Salem</option>
<option>Attur</option>
<option>Omalur</option>
<option>Edappadi</option>
<option>Mettur</option>
<option>Namakkal</option>
<option>Rasipuram</option>
<option>Tiruchengode</option>
<option>Erode</option>
<option>Karur</option>
<option>Kulithalai</option>

<option>Theni</option>
<option>Periyakulam</option>
<option>Bodinayakanur</option>
<option>Virudhunagar</option>
<option>Sivakasi</option>
<option>Rajapalayam</option>
<option>Tirunelveli</option>

<option>Nagercoil</option>

</select>

<label id="cropLabel">Crop Type</label>

<select name="description">

<option>Select Crop</option>

<option>Paddy (Rice)</option>
<option>Maize</option>
<option>Ragi</option>
<option>Sorghum</option>
<option>Sugarcane</option>
<option>Cotton</option>
<option>Groundnut</option>
<option>Sunflower</option>
<option>Banana</option>
<option>Coconut</option>
<option>Tomato</option>
<option>Chilli</option>
<option>Onion</option>
<option>Brinjal</option>
<option>Potato</option>

<option>Other</option>

</select>

<label id="periodLabel">Cultivation Period</label>

<select name="description">

<option>Select Period</option>

<option>0 - 30 Days</option>
<option>30 - 60 Days</option>
<option>60 - 90 Days</option>
<option>90 - 120 Days</option>
<option>120+ Days</option>

</select>

<label id="pestLabel">Pest Type</label>

<select name="subject">

<option>Select Pest</option>

<option>Leaf Folder</option>
<option>Stem Borer</option>
<option>Armyworm</option>
<option>Brown Planthopper</option>
<option>Green Leafhopper</option>
<option>Gall Midge</option>
<option>Rice Hispa</option>
<option>Thrips</option>
<option>Whitefly</option>
<option>Aphids</option>

<option>Other</option>

</select>

<label id="infectLabel">Infected Level</label>

<select name="priority">

<option>Select Level</option>

<option>Low</option>
<option>Medium</option>
<option>High</option>

</select>

<label id="descLabel">Description</label>

<textarea name="description"></textarea>

<button id="submitBtn" type="submit">Submit Report</button>

</form>

</body>

</html>
