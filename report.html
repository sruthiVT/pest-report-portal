<!DOCTYPE html>
<html>
<head>
<title>Farmer Pest Report</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("https://images.unsplash.com/photo-1500382017468-9049fed747ef") no-repeat center center/cover;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* Medium size box like login page */

.container{
width:420px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.3);
}

/* Admin dashboard bigger */

.adminContainer{
width:900px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.3);
}

h2{text-align:center;}

label{font-weight:bold;}

input,select,textarea{
width:100%;
padding:10px;
margin:8px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:green;
color:white;
border:none;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

.pestInfo{
color:green;
font-weight:bold;
margin-top:5px;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>

(function(){
emailjs.init("3oTB5lj9pKw_10I6R");
})();

</script>

</head>

<body>

<!-- FARMER PAGE -->

<div id="farmerPage" class="container">

<h2 id="title">🌾 Farmer Pest Report</h2>

<form id="pestForm"
onsubmit="uploadImage(event)"
method="POST"
action="https://webto.salesforce.com/servlet/servlet.WebToCase?encoding=UTF-8">

<input type="hidden" name="orgid" value="00DdM00000iSfdB">

<input type="hidden" name="retURL"
value="https://sruthivt.github.io/pest-report-portal/success.html">

<input type="hidden" name="suppliedname" id="farmerName">
<input type="hidden" name="suppliedemail" id="farmerEmail">
<input type="hidden" name="suppliedphone" id="farmerPhone">

<input type="hidden" name="Crop_Image_URL__c" id="imageURL">

<label id="villageLabel">Village</label>

<select name="Village__c">
<option>Pollachi</option>
<option>Udumalpet</option>
<option>Perundurai</option>
<option>Erode</option>
<option>Salem</option>
<option>Madurai</option>
<option>Trichy</option>
<option>Tirunelveli</option>
</select>

<label id="cropLabel">Crop Type</label>

<select name="Product__c">
<option>Paddy (Rice)</option>
<option>Maize</option>
<option>Cotton</option>
<option>Groundnut</option>
<option>Banana</option>
<option>Coconut</option>
<option>Tomato</option>
<option>Chilli</option>
</select>

<label id="periodLabel">Cultivation Period</label>

<select name="Cultivation_Period__c">
<option>0 - 30 Days</option>
<option>30 - 60 Days</option>
<option>60 - 90 Days</option>
<option>90 - 120 Days</option>
<option>120+ Days</option>
</select>

<label id="pestLabel">Pest Type</label>

<select name="subject" id="pestType" onchange="showPestInfo()">
<option>Leaf Folder</option>
<option>Stem Borer</option>
<option>Brown Plant Hopper</option>
<option>Armyworm</option>
<option>Aphids</option>
<option>Whiteflies</option>
</select>

<p id="pestDescription" class="pestInfo"></p>

<label id="severityLabel">Infected Level</label>

<select name="Severity_Level__c">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<label id="imageLabel">Upload Crop Image</label>

<input type="file" id="imageUpload" required>

<label id="descLabel">Description</label>

<textarea name="description"></textarea>

<button type="submit" id="submitBtn">Submit Report</button>

</form>

</div>

<!-- ADMIN DASHBOARD -->

<div id="adminPage" class="adminContainer" style="display:none">

<h2>🌾 Farmer Complaints Dashboard</h2>

<p>Below are farmer complaints submitted to the system.</p>

<iframe
src="https://login.salesforce.com/lightning/o/Case/list"
width="100%"
height="600"
style="border:none;">
</iframe>

</div>

<script>

/* ROLE CHECK */

let role = localStorage.getItem("userRole");

if(role === "admin"){

document.getElementById("farmerPage").style.display="none";
document.getElementById("adminPage").style.display="block";

}

let farmerName = localStorage.getItem("farmerName");
let farmerEmail = localStorage.getItem("farmerEmail");
let farmerPhone = localStorage.getItem("farmerPhone");

document.getElementById("farmerName").value = farmerName;
document.getElementById("farmerEmail").value = farmerEmail;
document.getElementById("farmerPhone").value = farmerPhone;

let lang = localStorage.getItem("farmerLanguage");

if(lang=="tamil"){

document.getElementById("title").innerHTML="🌾 பூச்சி புகார் பதிவு";
document.getElementById("villageLabel").innerHTML="கிராமம்";
document.getElementById("cropLabel").innerHTML="பயிர் வகை";
document.getElementById("periodLabel").innerHTML="சாகுபடி காலம்";
document.getElementById("pestLabel").innerHTML="பூச்சி வகை";
document.getElementById("severityLabel").innerHTML="பாதிப்பு அளவு";
document.getElementById("imageLabel").innerHTML="பயிர் படம்";
document.getElementById("descLabel").innerHTML="விளக்கம்";
document.getElementById("submitBtn").innerHTML="புகார் சமர்ப்பிக்க";

}

function showPestInfo(){

let pest=document.getElementById("pestType").value;
let text="";

if(pest=="Leaf Folder")
text="Damages rice leaves by folding them and feeding inside.";

else if(pest=="Stem Borer")
text="Attacks crops like rice and maize by boring into stems.";

else if(pest=="Brown Plant Hopper")
text="Major pest in rice fields that sucks plant sap.";

else if(pest=="Armyworm")
text="Eats large areas of crops such as maize and grasses.";

else if(pest=="Aphids")
text="Small insects that suck sap from plants like cotton.";

else if(pest=="Whiteflies")
text="Spread plant viruses and damage crops like tomato.";

document.getElementById("pestDescription").innerText=text;

}

async function uploadImage(event){

event.preventDefault();

const file=document.getElementById("imageUpload").files[0];

const apiKey="9d9a3054573db11bcb75e2a3da97e3de";

let formData=new FormData();
formData.append("image",file);

let res=await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`,{
method:"POST",
body:formData
});

let data=await res.json();

let imageURL=data.data.url;

document.getElementById("imageURL").value=imageURL;

emailjs.send("service_5be3jfq","template_f6nyiit",{

farmer_name:farmerName,
farmer_email:farmerEmail,
pest_type:document.querySelector("[name='subject']").value,
village:document.querySelector("[name='Village__c']").value

});

document.getElementById("pestForm").submit();

}

</script>

</body>
</html>
