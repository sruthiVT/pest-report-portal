<!DOCTYPE html>
<html>
<head>
<title>Farmer Pest Report</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
padding:30px;
}
.container{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}
h2{text-align:center;}
label{font-weight:bold;}
input,select,textarea{
width:100%;
padding:12px;
margin:8px 0;
border-radius:5px;
border:1px solid #ccc;
}
button{
width:100%;
padding:12px;
background:green;
color:white;
border:none;
font-size:16px;
border-radius:5px;
cursor:pointer;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
(function(){
emailjs.init("3oTB5lj9pKw_10I6R");
})();
</script>

</head>

<body>

<div class="container">

<h2>🌾 Farmer Pest Report</h2>

<form id="pestForm"
onsubmit="uploadImage(event)"
method="POST"
action="https://webto.salesforce.com/servlet/servlet.WebToCase?encoding=UTF-8">

<input type="hidden" name="orgid" value="00DdM00000iSfdB">

<input type="hidden" name="retURL"
value="https://sruthivt.github.io/pest-report-portal/success.html">

<!-- ✅ CUSTOM FIELDS -->
<input type="hidden" name="Farmer_Name__c" id="farmerName">
<input type="hidden" name="Email__c" id="farmerEmail">
<input type="hidden" name="Mobile_Number__c" id="farmerPhone">

<input type="hidden" name="Crop_Image_URL__c" id="imageURL">

<label>Village</label>
<select name="Village__c" id="villageSelect">
<option>Pollachi</option>
<option>Udumalpet</option>
<option>Tiruppur</option>
<option>Erode</option>
<option>Coimbatore</option>
</select>

<label>Crop Type</label>
<select name="Product__c">
<option>Paddy</option>
<option>Maize</option>
<option>Cotton</option>
<option>Groundnut</option>
</select>

<label>Pest Type</label>
<select name="subject">
<option>Leaf Folder</option>
<option>Stem Borer</option>
<option>Brown Plant Hopper</option>
<option>Armyworm</option>
</select>

<label>Severity</label>
<select name="Severity_Level__c">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<label>Upload Image</label>
<input type="file" id="imageUpload" required>

<label>Description</label>
<textarea name="description"></textarea>

<button type="submit">Submit Report</button>

</form>

</div>

<script>

// ✅ GET DATA FROM LOCAL STORAGE
let farmerName = localStorage.getItem("farmerName");
let farmerEmail = localStorage.getItem("farmerEmail");
let farmerPhone = localStorage.getItem("farmerPhone");

// ✅ SET VALUES
document.getElementById("farmerName").value = farmerName || "Unknown";
document.getElementById("farmerEmail").value = farmerEmail || "test@gmail.com";
document.getElementById("farmerPhone").value = farmerPhone || "9999999999";

// ✅ SET LOCATION FROM VILLAGE
document.getElementById("villageSelect").addEventListener("change", function(){
document.getElementById("locationField").value = this.value;
});

// default set
document.getElementById("locationField").value =
document.getElementById("villageSelect").value;

async function uploadImage(event){

event.preventDefault();

const file=document.getElementById("imageUpload").files[0];
const apiKey="9d9a3054573db11bcb75e2a3da97e3de";

let formData=new FormData();
formData.append("image",file);

let res=await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`,{
method:"POST",
body:formData
});

let data=await res.json();
let imageURL=data.data.url;

document.getElementById("imageURL").value=imageURL;

// ✅ SEND EMAIL
emailjs.send("service_5be3jfq","template_f6nyiit",{
farmer_name: farmerName,
farmer_email: farmerEmail
});

// ✅ SUBMIT FORM
document.getElementById("pestForm").submit();

}

</script>

</body>
</html>
