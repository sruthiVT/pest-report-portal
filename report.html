<!DOCTYPE html>
<html>
<head>
<title>Farmer Pest Report</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
padding:30px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{text-align:center;}

label{font-weight:bold;}

input,select,textarea{
width:100%;
padding:12px;
margin:8px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:green;
color:white;
border:none;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

.pestInfo{
color:green;
font-weight:bold;
margin-top:5px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
emailjs.init("3oTB5lj9pKw_10I6R");
})();
</script>

</head>

<body>

<div class="container">

<h2 id="title">🌾 Farmer Pest Report</h2>

<form id="pestForm"
onsubmit="uploadImage(event)"
method="POST"
action="https://webto.salesforce.com/servlet/servlet.WebToCase?encoding=UTF-8">

<!-- Salesforce Org -->
<input type="hidden" name="orgid" value="00DdM00000iSfdB">

<!-- Redirect -->
<input type="hidden" name="retURL"
value="https://sruthivt.github.io/pest-report-portal/success.html">

<!-- ✅ FIXED FIELD NAMES (IMPORTANT) -->
<input type="hidden" name="suppliedName" id="farmerName">
<input type="hidden" name="suppliedEmail" id="farmerEmail">
<input type="hidden" name="suppliedPhone" id="farmerPhone">

<!-- IMAGE -->
<input type="hidden" name="Crop_Image_URL__c" id="imageURL">

<!-- ✅ LOCATION FIELD ADDED -->
<input type="hidden" name="Location__c" id="location">

<label>Village</label>
<select name="Village__c" id="village">
<option>Pollachi</option>
<option>Udumalpet</option>
<option>Avinashi</option>
<option>Tiruppur</option>
</select>

<label>Crop Type</label>
<select name="Product__c">
<option>Paddy</option>
<option>Maize</option>
<option>Cotton</option>
<option>Groundnut</option>
</select>

<label>Cultivation Period</label>
<select name="Cultivation_Period__c">
<option>0 - 30 Days</option>
<option>30 - 60 Days</option>
<option>60 - 90 Days</option>
</select>

<label>Pest Type</label>
<select name="subject" id="pestType" onchange="showPestInfo()">
<option>Leaf Folder</option>
<option>Stem Borer</option>
<option>Brown Plant Hopper</option>
<option>Armyworm</option>
</select>

<p id="pestDescription" class="pestInfo"></p>

<label>Severity Level</label>
<select name="Severity_Level__c">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<label>Upload Crop Image</label>
<input type="file" id="imageUpload" required>

<label>Description</label>
<textarea name="description"></textarea>

<button type="submit">Submit Report</button>

</form>

</div>

<script>

/* GET FARMER DATA */
let farmerName = localStorage.getItem("farmerName");
let farmerEmail = localStorage.getItem("farmerEmail");
let farmerPhone = localStorage.getItem("farmerPhone");

/* SAFE FALLBACKS */
document.getElementById("farmerName").value = farmerName || "Unknown Farmer";
document.getElementById("farmerEmail").value = farmerEmail || "unknown@email.com";
document.getElementById("farmerPhone").value = farmerPhone || "0000000000";

/* LOCATION MAPPING (IMPORTANT FIX) */
document.getElementById("location").value =
document.getElementById("village").value;

/* UPDATE LOCATION WHEN VILLAGE CHANGES */
document.getElementById("village").addEventListener("change", function(){
document.getElementById("location").value = this.value;
});

/* PEST INFO */
function showPestInfo(){
let pest=document.getElementById("pestType").value;
let text="";

if(pest=="Leaf Folder") text="Damages rice leaves.";
else if(pest=="Stem Borer") text="Bores inside stems.";
else if(pest=="Brown Plant Hopper") text="Sucks plant sap.";
else if(pest=="Armyworm") text="Eats leaves quickly.";

document.getElementById("pestDescription").innerText=text;
}

/* MAIN FUNCTION */
async function uploadImage(event){

event.preventDefault();

const file = document.getElementById("imageUpload").files[0];

if(!file){
alert("Upload image");
return;
}

const apiKey="9d9a3054573db11bcb75e2a3da97e3de";

let formData=new FormData();
formData.append("image",file);

try{

let res = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`,{
method:"POST",
body:formData
});

let data = await res.json();
let imageURL = data.data.url;

document.getElementById("imageURL").value = imageURL;

/* EMAIL */
await emailjs.send("service_5be3jfq","template_f6nyiit",{
farmer_name: farmerName,
farmer_email: farmerEmail,
pest_type: document.querySelector("[name='subject']").value,
village: document.querySelector("[name='Village__c']").value,
image_url: imageURL
});

/* SUBMIT */
document.getElementById("pestForm").submit();

}catch(err){
alert("Error: "+err.message);
}
}

</script>

</body>
</html>
