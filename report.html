```html
<!DOCTYPE html>
<html>
<head>

<title id="title">Farmer Pest Report</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#6bbf3f,#b8e994);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.phone{
width:360px;
height:640px;
background:black;
border-radius:35px;
padding:10px;
}

.screen{
background:white;
height:100%;
border-radius:25px;
padding:20px;
overflow:auto;
}

select,input,textarea{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#4CAF50;
border:none;
color:white;
border-radius:6px;
}

</style>

<script>

window.onload=function(){

let lang=localStorage.getItem("farmerLanguage");

if(lang=="tamil"){

document.getElementById("titleText").innerHTML="🌾 பூச்சி புகார் பதிவு";
document.getElementById("village").innerHTML="கிராமம்";
document.getElementById("crop").innerHTML="பயிர் வகை";
document.getElementById("period").innerHTML="சாகுபடி காலம்";
document.getElementById("pest").innerHTML="பூச்சி வகை";
document.getElementById("infect").innerHTML="பாதிப்பு நிலை";
document.getElementById("image").innerHTML="பயிர் படம்";
document.getElementById("desc").innerHTML="விவரம்";
document.getElementById("submit").innerHTML="புகார் சமர்ப்பிக்க";

}

}

</script>

</head>

<body>

<div class="phone">

<div class="screen">

<h2 id="titleText">🌾 Farmer Pest Report</h2>

<form action="https://webto.salesforce.com/servlet/servlet.WebToCase?encoding=UTF-8&orgId=00DdM00000iSfdB" method="POST">

<input type="hidden" name="orgid" value="00DdM00000iSfdB">

<label id="village">Village</label>

<select name="Village__c">
<option>Udumalpet</option>
<option>Avinashi</option>
<option>Tiruppur</option>
<option>Dharapuram</option>
</select>

<label id="crop">Crop Type</label>

<select name="Product__c">
<option>Paddy</option>
<option>Maize</option>
<option>Groundnut</option>
<option>Banana</option>
</select>

<label id="period">Cultivation Period</label>

<select name="Cultivation_Period__c">
<option>0-30 Days</option>
<option>30-60 Days</option>
<option>60-90 Days</option>
<option>90-120 Days</option>
</select>

<label id="pest">Pest Type</label>

<select name="subject">
<option>Stem Borer</option>
<option>Leaf Folder</option>
<option>Armyworm</option>
<option>Brown Planthopper</option>
</select>

<label id="infect">Infected Level</label>

<select name="priority">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<label id="image">Crop Image URL</label>
<input type="url" name="Crop_Image_URL__c">

<label id="desc">Description</label>
<textarea name="description"></textarea>

<button id="submit">Submit Report</button>

</form>

</div>

</div>

</body>
</html>
