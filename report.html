<!DOCTYPE html>
<html>

<head>
<title>Farmer Pest Report</title>
<meta charset="UTF-8">

<style>

body{font-family:Arial;background:#f4f4f4;text-align:center;padding:40px;}

form{
background:white;
padding:25px;
border-radius:10px;
width:420px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,textarea,select{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:green;
color:white;
padding:12px;
border:none;
border-radius:5px;
width:100%;
font-size:16px;
}

</style>

<script>

window.onload=function(){

let lang=localStorage.getItem("farmerLanguage");

if(lang=="tamil"){

document.getElementById("title").innerHTML="🌾 பூச்சி புகார் பதிவு";
document.getElementById("nameLabel").innerHTML="விவசாயி பெயர்";
document.getElementById("emailLabel").innerHTML="மின்னஞ்சல்";
document.getElementById("phoneLabel").innerHTML="தொலைபேசி";
document.getElementById("villageLabel").innerHTML="கிராமம்";
document.getElementById("cropLabel").innerHTML="பயிர் வகை";
document.getElementById("periodLabel").innerHTML="சாகுபடி காலம்";
document.getElementById("pestLabel").innerHTML="பூச்சி வகை";
document.getElementById("infectLabel").innerHTML="பாதிப்பு நிலை";
document.getElementById("descLabel").innerHTML="விவரம்";
document.getElementById("submitBtn").innerHTML="புகார் சமர்ப்பிக்க";

}

}

</script>

</head>

<body>

<h2 id="title">🌾 Farmer Pest Report</h2>

<form action="https://webto.salesforce.com/servlet/servlet.WebToCase?encoding=UTF-8&orgId=00DdM00000iSfdB" method="POST">

<input type="hidden" name="orgid" value="00DdM00000iSfdB">
<input type="hidden" name="retURL" value="success.html">
<input type="hidden" name="origin" value="Web">

<label id="nameLabel">Farmer Name</label>
<input type="text" name="suppliedname">

<label id="emailLabel">Email</label>
<input type="email" name="suppliedemail">

<label id="phoneLabel">Phone</label>
<input type="text" name="suppliedphone">

<label id="villageLabel">Village</label>
<input type="text" name="Village__c">

<label id="cropLabel">Crop Type</label>
<input type="text" name="Product__c">

<label id="periodLabel">Cultivation Period</label>
<input type="text" name="Escalation_Level__c">

<label id="pestLabel">Pest Type</label>
<input type="text" name="subject">

<label id="infectLabel">Infected Level</label>
<select name="priority">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<label id="descLabel">Description</label>
<textarea name="description"></textarea>

<button id="submitBtn" type="submit">Submit Report</button>

</form>

</body>
</html>
