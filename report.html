<!DOCTYPE html>
<html>

<head>
<title>Farmer Pest Report</title>
<meta http-equiv="Content-type" content="text/html; charset=UTF-8">

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
padding:40px;
}

form{
background:white;
padding:25px;
border-radius:10px;
width:420px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,textarea,select{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:green;
color:white;
padding:12px;
border:none;
border-radius:5px;
width:100%;
font-size:16px;
cursor:pointer;
}

</style>

<form action="https://webto.salesforce.com/servlet/servlet.WebToCase?encoding=UTF-8&orgId=00DdM00000iSfdB" method="POST">

<input type="hidden" name="retURL" value="https://sruthivt.github.io/pest-report-portal/success.html">

</select>

<textarea name="description"></textarea>

<button type="submit">Submit Report</button>
