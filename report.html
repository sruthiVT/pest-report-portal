<!DOCTYPE html>
<html>

<head>
<title>Farmer Pest Report</title>
<meta charset="UTF-8">

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
padding:40px;
}

form{
background:white;
padding:25px;
border-radius:10px;
width:420px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,textarea,select{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:green;
color:white;
padding:12px;
border:none;
border-radius:5px;
width:100%;
font-size:16px;
cursor:pointer;
}

</style>

<script>

window.onload=function(){

/* Load farmer details from login page */

document.getElementById("farmerName").value =
localStorage.getItem("farmerName");

document.getElementById("farmerEmail").value =
localStorage.getItem("farmerEmail");

document.getElementById("farmerPhone").value =
localStorage.getItem("farmerPhone");

/* Language */

let lang = localStorage.getItem("farmerLanguage");

if(lang=="tamil"){

document.getElementById("title").innerHTML="🌾 பூச்சி புகார் பதிவு";
document.getElementById("villageLabel").innerHTML="கிராமம்";
document.getElementById("cropLabel").innerHTML="பயிர் வகை";
document.getElementById("periodLabel").innerHTML="சாகுபடி காலம்";
document.getElementById("pestLabel").innerHTML="பூச்சி வகை";
document.getElementById("infectLabel").innerHTML="பாதிப்பு நிலை";
document.getElementById("imgLabel").innerHTML="பயிர் படம் பதிவேற்றம்";
document.getElementById("descLabel").innerHTML="விவரம்";
document.getElementById("submitBtn").innerHTML="புகார் சமர்ப்பிக்க";

/* Village Tamil */

let villages=[
"கிராமத்தை தேர்ந்தெடுக்கவும்",
"உடுமல்பேட்டை",
"அவினாசி",
"திருப்பூர்",
"தாராபுரம்",
"பொள்ளாச்சி",
"பல்லடம்",
"காங்கேயம்",
"மதத்துக்குளம்"
];

let villageSelect=document.querySelector("select[name='Village__c']");
villageSelect.innerHTML="";

villages.forEach(v=>{
let opt=document.createElement("option");
opt.text=v;
opt.value=v;
villageSelect.appendChild(opt);
});

/* Crop Tamil */

let crops=[
"பயிரை தேர்ந்தெடுக்கவும்",
"நெல்",
"மக்காச்சோளம்",
"ராகி",
"சோளம்",
"நிலக்கடலை",
"பருத்தி",
"கரும்பு",
"தக்காளி",
"வெங்காயம்"
];

let cropSelect=document.querySelector("select[name='Product__c']");
cropSelect.innerHTML="";

crops.forEach(c=>{
let opt=document.createElement("option");
opt.text=c;
opt.value=c;
cropSelect.appendChild(opt);
});

/* Period Tamil */

let periods=[
"காலத்தை தேர்ந்தெடுக்கவும்",
"0 - 30 நாட்கள்",
"30 - 60 நாட்கள்",
"60 - 90 நாட்கள்",
"90 - 120 நாட்கள்",
"120 நாட்களுக்கு மேல்"
];

let periodSelect=document.querySelector("select[name='Cultivation_Period__c']");
periodSelect.innerHTML="";

periods.forEach(p=>{
let opt=document.createElement("option");
opt.text=p;
opt.value=p;
periodSelect.appendChild(opt);
});

/* Pest Tamil */

let pests=[
"பூச்சியை தேர்ந்தெடுக்கவும்",
"இலை மடிப்பு பூச்சி",
"தண்டு துளைப்பான்",
"ஆர்மிவார்ம்",
"பிரவுன் பிளாண்ட் ஹாப்பர்",
"திரிப்ஸ்",
"அஃபிட்ஸ்",
"வெள்ளை ஈ",
"பழ துளைப்பான்"
];

let pestSelect=document.querySelector("select[name='subject']");
pestSelect.innerHTML="";

pests.forEach(p=>{
let opt=document.createElement("option");
opt.text=p;
opt.value=p;
pestSelect.appendChild(opt);
});

/* Infection Tamil */

let levels=[
"குறைவு",
"நடுத்தரம்",
"அதிகம்",
"மிக அதிகம்"
];

let levelSelect=document.querySelector("select[name='priority']");
levelSelect.innerHTML="";

levels.forEach(l=>{
let opt=document.createElement("option");
opt.text=l;
opt.value=l;
levelSelect.appendChild(opt);
});

}

}

/* Upload image to ImgBB */

async function uploadImage(){

let file=document.getElementById("imageUpload").files[0];

if(!file){
alert("Please upload crop image");
return;
}

let formData=new FormData();
formData.append("image",file);

let response=await fetch(
"https://api.imgbb.com/1/upload?key=9d9a3054573db11bcb75e2a3da97e3de",
{
method:"POST",
body:formData
});

let data=await response.json();

/* Save image URL */

document.getElementById("imageURL").value=data.data.url;

/* Submit form */

document.getElementById("reportForm").submit();

}

</script>

</head>

<body>

<h2 id="title">🌾 Farmer Pest Report</h2>

<form id="reportForm"
action="https://webto.salesforce.com/servlet/servlet.WebToCase?encoding=UTF-8&orgId=00DdM00000iSfdB"
method="POST">

<input type="hidden" name="orgid" value="00DdM00000iSfdB">
<input type="hidden" name="retURL" value="success.html">
<input type="hidden" name="origin" value="Web">

<input type="hidden" id="farmerName" name="suppliedname">
<input type="hidden" id="farmerEmail" name="suppliedemail">
<input type="hidden" id="farmerPhone" name="suppliedphone">

<input type="hidden" id="imageURL" name="Crop_Image_URL__c">

<label id="villageLabel">Village</label>

<select name="Village__c" required>
<option>Select Village</option>
<option>Udumalpet</option>
<option>Avinashi</option>
<option>Tiruppur</option>
<option>Dharapuram</option>
<option>Pollachi</option>
<option>Palladam</option>
<option>Kangeyam</option>
<option>Madathukulam</option>
</select>

<label id="cropLabel">Crop Type</label>

<select name="Product__c" required>
<option>Select Crop</option>
<option>Paddy</option>
<option>Maize</option>
<option>Ragi</option>
<option>Sorghum</option>
<option>Groundnut</option>
<option>Cotton</option>
<option>Sugarcane</option>
<option>Tomato</option>
<option>Onion</option>
</select>

<label id="periodLabel">Cultivation Period</label>

<select name="Cultivation_Period__c" required>
<option>Select Period</option>
<option>0 - 30 Days</option>
<option>30 - 60 Days</option>
<option>60 - 90 Days</option>
<option>90 - 120 Days</option>
<option>120+ Days</option>
</select>

<label id="pestLabel">Pest Type</label>

<select name="subject" required>
<option>Select Pest</option>
<option>Leaf Folder</option>
<option>Stem Borer</option>
<option>Armyworm</option>
<option>Brown Plant Hopper</option>
<option>Thrips</option>
<option>Aphids</option>
<option>Whitefly</option>
<option>Fruit Borer</option>
</select>

<label id="infectLabel">Infected Level</label>

<select name="priority">
<option>Low</option>
<option>Medium</option>
<option>High</option>
<option>Very High</option>
</select>

<label id="imgLabel">Upload Crop Image</label>
<input type="file" id="imageUpload" accept="image/*" required>

<label id="descLabel">Description</label>
<textarea name="description"></textarea>

<button id="submitBtn" type="button" onclick="uploadImage()">
Submit Report
</button>

</form>

</body>
</html>
