<!DOCTYPE html>
<html>
<head>
<title>Submit Pest Report</title>
<style>
body {font-family: Arial; background: #f4f4f4; padding: 50px;}
.container {background: white; width: 650px; margin: auto; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1);}
input, textarea, select {width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px;}
button {background: green; color: white; padding: 12px; border: none; width: 100%; border-radius: 5px; font-size: 16px;}
label {font-weight: bold;}
</style>
<script>
// Auto-fill farmer info and handle bilingual labels/options
window.onload = function() {
    var lang = localStorage.getItem("farmerLanguage") || "english";

    // Auto-fill farmer info
    document.getElementById("farmerName").value = localStorage.getItem("farmerName");
    document.getElementById("farmerEmail").value = localStorage.getItem("farmerEmail");
    document.getElementById("farmerPhone").value = localStorage.getItem("farmerPhone");
    document.getElementById("Language__c").value = lang;

    // Labels
    var labels = {
        english: {village:"Village", crop:"Crop Type", period:"Cultivation Period", pest:"Pest Type", infected:"Infected Level", cropImage:"Crop Image URL", description:"Description"},
        tamil: {village:"கிராமம்", crop:"பயிர் வகை", period:"பயிர் வளர்ப்பு காலம்", pest:"பூச்சி வகை", infected:"பருமாண நிலை", cropImage:"பயிர் படத்தின் URL", description:"விவரம்"}
    };

    document.getElementById("villageLabel").innerHTML = labels[lang].village;
    document.getElementById("cropLabel").innerHTML = labels[lang].crop;
    document.getElementById("periodLabel").innerHTML = labels[lang].period;
    document.getElementById("pestLabel").innerHTML = labels[lang].pest;
    document.getElementById("infectedLabel").innerHTML = labels[lang].infected;
    document.getElementById("cropImageLabel").innerHTML = labels[lang].cropImage;
    document.getElementById("descriptionLabel").innerHTML = labels[lang].description;

    // Dropdown options
    var villages = [
        {en:"Select Village", ta:"கிராமத்தை தேர்வு செய்யவும்"}, {en:"Pollachi", ta:"பொள்ளாச்சி"}, {en:"Udumalpet", ta:"உடுமலைப்பேட்டை"},
        {en:"Kinathukadavu", ta:"கிணத்துக்கடவு"}, {en:"Valparai", ta:"வால்பரை"}, {en:"Perundurai", ta:"பெருந்துறை"},
        {en:"Gobichettipalayam", ta:"கோபிச்செட்டிபாளையம்"}, {en:"Sathyamangalam", ta:"சத்தியமங்கலம்"}, {en:"Bhavani", ta:"பவானி"},
        {en:"Anthiyur", ta:"அந்தியூர்"}, {en:"Nambiyur", ta:"நம்பியூர்"}, {en:"Kodumudi", ta:"கொடுமுடி"}, {en:"Avinashi", ta:"அவிநாசி"},
        {en:"Tiruppur", ta:"திருப்பூர்"}, {en:"Dharapuram", ta:"தராபுரம்"}, {en:"Kangeyam", ta:"காங்கேயம்"}, {en:"Palladam", ta:"பள்ளாடம்"},
        {en:"Thanjavur", ta:"தஞ்சாவூர்"}, {en:"Kumbakonam", ta:"கும்பகோணம்"}, {en:"Orathanadu", ta:"ஒரத்தனாடு"}, {en:"Pattukkottai", ta:"பட்டுக்கோட்டை"},
        {en:"Mayiladuthurai", ta:"மயிலாடுதுறை"}, {en:"Sirkazhi", ta:"சிற்காசி"}, {en:"Nagapattinam", ta:"நாகப்பட்டினம்"}, {en:"Velankanni", ta:"வேளாங்கண்ணி"},
        {en:"Cuddalore", ta:"கடலூர்"}, {en:"Panruti", ta:"பன்ரூட்டி"}, {en:"Chidambaram", ta:"சிதம்பரம்"}, {en:"Villupuram", ta:"விழுப்புரம்"},
        {en:"Tindivanam", ta:"திண்டிவனம்"}, {en:"Salem", ta:"சேலம்"}, {en:"Attur", ta:"அட்டூர்"}, {en:"Omalur", ta:"ஓமாலூர்"}, {en:"Edappadi", ta:"எடப்பாடி"},
        {en:"Mettur", ta:"மேட்டூர்"}, {en:"Namakkal", ta:"நாமக்கல்"}, {en:"Rasipuram", ta:"ராசிபுரம்"}, {en:"Tiruchengode", ta:"திருச்செங்கோடு"}, 
        {en:"Erode", ta:"ஈரோடு"}, {en:"Karur", ta:"கரூர்"}, {en:"Kulithalai", ta:"குளித்தலை"}, {en:"Trichy", ta:"திருச்சி"}, {en:"Musiri", ta:"முசிறி"},
        {en:"Lalgudi", ta:"லால்குடி"}, {en:"Madurai", ta:"மதுரை"}, {en:"Usilampatti", ta:"உசிலம்பட்டி"}, {en:"Dindigul", ta:"திண்டுக்கல்"}, {en:"Palani", ta:"பழனி"},
        {en:"Oddanchatram", ta:"ஒட்டன்சத்திரம்"}, {en:"Theni", ta:"தேனி"}, {en:"Periyakulam", ta:"பெரியகுளம்"}, {en:"Bodinayakanur", ta:"போடிநாயக்கனூர்"},
        {en:"Virudhunagar", ta:"வீருதுநகர்"}, {en:"Sivakasi", ta:"சிவகாசி"}, {en:"Rajapalayam", ta:"ராஜபாளையம்"}, {en:"Tirunelveli", ta:"திருநெல்வேலி"},
        {en:"Ambasamudram", ta:"அம்பாசமுத்ரம்"}, {en:"Tenkasi", ta:"தேன்காசி"}, {en:"Thoothukudi", ta:"தூத்துக்குடி"}, {en:"Kovilpatti", ta:"கோவில்பட்டி"},
        {en:"Kanyakumari", ta:"கன்யாகுமரி"}, {en:"Nagercoil", ta:"நாகர்கோவில்"}
    ];

    var crops = [
        {en:"Select Crop", ta:"பயிர் தேர்வு செய்யவும்"}, {en:"Paddy", ta:"அரிசி"}, {en:"Sugarcane", ta:"சர்க்கரை களம்"}, 
        {en:"Banana", ta:"வாழை"}, {en:"Maize", ta:"சோளம்"}, {en:"Cotton", ta:"பம்பரம்"}
    ];

    var cultivation = [
        {en:"Select Period", ta:"காலம் தேர்வு செய்யவும்"}, {en:"60-90 Days", ta:"60-90 நாட்கள்"}, {en:"90-120 Days", ta:"90-120 நாட்கள்"}, 
        {en:"120-150 Days", ta:"120-150 நாட்கள்"}, {en:"150-180 Days", ta:"150-180 நாட்கள்"}
    ];

    var pests = [
        {en:"Select Pest", ta:"பூச்சி தேர்வு செய்யவும்"}, {en:"Leaf Folder", ta:"இலை ஃபோல்டர்"}, {en:"Stem Borer", ta:"தண்டு புழு"}, 
        {en:"Brown Plant Hopper", ta:"பழுப்பு செடி ஹாப்பர்"}
    ];

    var infected = [
        {en:"Select Level", ta:"நிலை தேர்வு செய்யவும்"}, {en:"Low", ta:"குறைவு"}, {en:"Medium", ta:"மத்திய"}, {en:"High", ta:"அதிகம்"}
    ];

    function fillDropdown(arr, selectId){
        var sel = document.getElementById(selectId);
        arr.forEach(function(optData){
            var opt = document.createElement("option");
            opt.value = optData.en;
            opt.text = optData.en;
            opt.setAttribute("data-ta", optData.ta);
            sel.appendChild(opt);
        });
        if(lang=="tamil"){
            for(var i=0;i<sel.options.length;i++){
                sel.options[i].text = sel.options[i].getAttribute("data-ta");
            }
        }
    }

    fillDropdown(villages, "Village__c");
    fillDropdown(crops, "Product__c");
    fillDropdown(cultivation, "Cultivation_Period__c");
    fillDropdown(pests, "Pest_Type__c");
    fillDropdown(infected, "Infected_Level__c");
};
</script>
</head>
<body>

<div class="container">
<h2 id="formTitle">Submit Pest Report</h2>

<form action="https://webto.salesforce.com/servlet/servlet.WebToCase?encoding=UTF-8" method="POST">
    <!-- Hidden Salesforce fields -->
    <input type="hidden" name="orgid" value="00DdM00000iSfdB">
    <input type="hidden" name="retURL" value="https://sruthivt.github.io/pest-report-portal/success.html">
    <input type="hidden" name="origin" value="Web">

    <!-- Hidden Farmer Info -->
    <input type="hidden" name="suppliedname" id="farmerName">
    <input type="hidden" name="suppliedemail" id="farmerEmail">
    <input type="hidden" name="suppliedphone" id="farmerPhone">

    <!-- Hidden Language -->
    <input type="hidden" name="Language__c" id="Language__c">

    <!-- Visible Fields -->
    <label id="villageLabel"></label>
    <select name="Village__c" id="Village__c"></select>

    <label id="cropLabel"></label>
    <select name="Product__c" id="Product__c"></select>

    <label id="periodLabel"></label>
    <select name="Cultivation_Period__c" id="Cultivation_Period__c"></select>

    <label id="pestLabel"></label>
    <select name="Pest_Type__c" id="Pest_Type__c"></select>

    <label id="infectedLabel"></label>
    <select name="Infected_Level__c" id="Infected_Level__c"></select>

    <label id="cropImageLabel"></label>
    <input type="url" name="Crop_Image_URL__c">

    <label id="descriptionLabel"></label>
    <textarea name="description"></textarea>

    <button type="submit">Submit Report</button>
</form>
</div>
</body>
</html>
