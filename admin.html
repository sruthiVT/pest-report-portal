<!DOCTYPE html>
<html>
<head>
<title>Admin - Farmer Complaints Dashboard</title>
<style>
body { font-family: Arial, sans-serif; margin:30px; background:#f5f5f5; }
h1 { text-align:center; }
table { width:100%; border-collapse: collapse; background:#fff; }
th, td { padding:12px; text-align:left; border-bottom:1px solid #ccc; }
th { background-color:#4CAF50; color:white; }
tr:hover { background-color:#f1f1f1; }
button { padding:5px 10px; cursor:pointer; }
</style>
</head>
<body>

<h1 id="dashboardTitle">🌾 Admin - Farmer Complaints Dashboard</h1>
<table id="complaintsTable">
<thead>
<tr>
<th>Farmer Name</th>
<th>Email</th>
<th>Phone</th>
<th>Crop</th>
<th>Pest Problem</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
const tableBody = document.querySelector('#complaintsTable tbody');
let cases = JSON.parse(localStorage.getItem("cases")) || [];
const adminName = localStorage.getItem("adminName") || "Admin";
document.getElementById("dashboardTitle").innerText = `🌾 ${adminName} - Farmer Complaints Dashboard`;

// Display all cases
function renderCases(){
  tableBody.innerHTML = "";
  cases.forEach((c, index) => {
    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${c.name}</td>
      <td>${c.email}</td>
      <td>${c.phone}</td>
      <td>${c.crop}</td>
      <td>${c.problem}</td>
      <td>${c.status}</td>
      <td>
        <button onclick="updateStatus(${index}, 'Resolved')">Mark Resolved</button>
      </td>
    `;
    tableBody.appendChild(row);
  });
}

// Update case status
function updateStatus(index, status){
  cases[index].status = status;
  localStorage.setItem("cases", JSON.stringify(cases));
  renderCases();
}

renderCases();
</script>

</body>
</html>
