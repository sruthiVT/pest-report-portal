<!DOCTYPE html>
<html>
<head>
<title>Admin - Farmer Complaints Dashboard</title>
<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  /* Same background as login page */
  background: url("https://images.unsplash.com/photo-1500382017468-9049fed747ef") no-repeat center center/cover;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container{
  width: 90%;
  max-width: 1000px;
  background: white;
  padding: 30px;
  border-radius: 10px;
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
  overflow-x: auto;
}

h1 {
  text-align:center;
  margin-bottom: 20px;
  color:#2e7d32;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 12px;
  text-align: left;
  border-bottom: 1px solid #ccc;
}

th {
  background-color: #4CAF50;
  color: white;
}

tr:hover {
  background-color: #f1f1f1;
}

button {
  padding:5px 10px;
  cursor:pointer;
  background: #1976d2;
  color: white;
  border: none;
  border-radius: 4px;
}

button:hover{
  background:#0d47a1;
}
</style>
</head>
<body>

<div class="container">
<h1 id="dashboardTitle">🌾 Admin - Farmer Complaints Dashboard</h1>

<table id="complaintsTable">
  <thead>
    <tr>
      <th>Farmer Name</th>
      <th>Email</th>
      <th>Phone</th>
      <th>Crop</th>
      <th>Pest Problem</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>
</div>

<script>
// Get the table body
const tableBody = document.querySelector('#complaintsTable tbody');

// Load cases from localStorage
let cases = JSON.parse(localStorage.getItem("cases")) || [];
const adminName = localStorage.getItem("adminName") || "Admin";
document.getElementById("dashboardTitle").innerText = `🌾 ${adminName} - Farmer Complaints Dashboard`;

// Function to render all cases
function renderCases(){
  tableBody.innerHTML = ""; // clear previous rows
  cases.forEach((c, index) => {
    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${c.name}</td>
      <td>${c.email}</td>
      <td>${c.phone}</td>
      <td>${c.crop}</td>
      <td>${c.problem}</td>
      <td>${c.status}</td>
      <td>
        <button onclick="updateStatus(${index}, 'Resolved')">Mark Resolved</button>
      </td>
    `;
    tableBody.appendChild(row);
  });
}

// Function to update status
function updateStatus(index, status){
  cases[index].status = status;
  localStorage.setItem("cases", JSON.stringify(cases));
  renderCases();
}

// Initial render
renderCases();
</script>

</body>
</html>
