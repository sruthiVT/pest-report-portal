<!DOCTYPE html>
<html>
<head>
    <title>Admin - Farmer Complaints Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background-color: #f5f5f5;
        }
        h1 {
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ccc;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        tr:hover {
            background-color: #f1f1f1;
        }
    </style>
</head>
<body>

<h1>🌾 Admin - Farmer Complaints Dashboard</h1>
<p>Below are complaints submitted by farmers.</p>

<table id="complaintsTable">
    <thead>
        <tr>
            <th>Farmer Name</th>
            <th>Crop</th>
            <th>Pest Problem</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody>
        <!-- Data will appear here -->
    </tbody>
</table>

<script>
    // You can replace this with your REST API call to Salesforce
    const complaints = [
        { name: 'Ramesh', crop: 'Rice', problem: 'Leaf infection', status: 'Pending' },
        { name: 'Suresh', crop: 'Cotton', problem: 'Insect attack', status: 'Resolved' },
        { name: 'Anita', crop: 'Wheat', problem: 'Pest infestation', status: 'Pending' }
    ];

    const tableBody = document.querySelector('#complaintsTable tbody');

    complaints.forEach(c => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${c.name}</td>
            <td>${c.crop}</td>
            <td>${c.problem}</td>
            <td>${c.status}</td>
        `;
        tableBody.appendChild(row);
    });
</script>

</body>
</html>
