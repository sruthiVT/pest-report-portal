<!DOCTYPE html>
<html>
<head>
<title>Farmer Complaints Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("https://images.unsplash.com/photo-1500382017468-9049fed747ef") no-repeat center center/cover;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:600px;
background:white;
padding:30px;
border-radius:10px;
text-align:center;
box-shadow:0 0 15px rgba(0,0,0,0.3);
}

button{
padding:12px;
width:100%;
background:green;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>🌾 Farmer Complaints Dashboard 🌾</h2>

<p>Click below to view farmer complaints stored in Salesforce.</p>

<button onclick="openSalesforce()">View Complaints</button>

</div>

<script>

function openSalesforce(){
window.open("https://login.salesforce.com","_blank");
}

</script>

</body>
</html>
