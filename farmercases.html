<!DOCTYPE html>
<html>
<head>
<title>Farmer Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("https://images.unsplash.com/photo-1500382017468-9049fed747ef") no-repeat center center/cover;
background-size:cover;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:95%;
max-width:1000px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
overflow-x:auto;
text-align:center;
}

h1{
color:#2e7d32;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ccc;
padding:10px;
text-align:left;
}

th{
background:#f4f4f4;
}

tr:hover{
background:#f1f1f1;
}

#submitBtn{
margin-top:20px;
float:right;
padding:12px 25px;
background:green;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

#submitBtn:hover{
background:#006400;
}

.container::after{
content:"";
display:table;
clear:both;
}

</style>

</head>

<body>

<div class="container">

<h1 id="title">🌾 Your Submitted Cases</h1>

<table id="casesTable">

<thead>

<tr>

<th>Village</th>
<th>Crop</th>
<th>Pest Type</th>
<th>Period</th>
<th>Level</th>
<th>Problem</th>
<th>Status</th>
<th>Officer Suggestion</th>
<th>Procedure</th>

</tr>

</thead>

<tbody></tbody>

</table>

<button id="submitBtn" onclick="goToSuccess()">Submit & Finish</button>

</div>

<script>

const lang = localStorage.getItem("farmerLanguage") || "english";

document.getElementById("title").innerText =
lang==="tamil" ? "🌾 உங்கள் சமர்ப்பிக்கப்பட்ட புகார்கள்" : "🌾 Your Submitted Cases";

const tableBody = document.querySelector('#casesTable tbody');

const allCases = JSON.parse(localStorage.getItem("cases")) || [];

const currentUser = localStorage.getItem("userName") || "";

/* Show only current farmer cases */

allCases.forEach(c=>{

if(c.name===currentUser){

const row=document.createElement('tr');

row.innerHTML=`

<td>${c.village}</td>
<td>${c.crop}</td>
<td>${c.pestType}</td>
<td>${c.period}</td>
<td>${c.level}</td>
<td>${c.problem}</td>
<td>${c.status || "Pending"}</td>
<td>${c.suggestion || "Waiting for officer response"}</td>
<td>${c.procedure || "Procedure will be updated by officer"}</td>

`;

tableBody.appendChild(row);

}

});

/* Finish button */

function goToSuccess(){

window.location.href="success.html";

}

</script>

</body>
</html>
