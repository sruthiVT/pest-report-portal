<!DOCTYPE html>
<html>
<head>
<title>Farmer Dashboard</title>

<style>

body{
font-family:Arial;
margin:0;
padding:0;
background:url("https://images.unsplash.com/photo-1500382017468-9049fed747ef") no-repeat center center/cover;
background-size:cover;
min-height:100vh;
}

.container{
width:90%;
max-width:1100px;
margin:40px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
overflow-x:auto;
}

h1{
text-align:center;
color:#2e7d32;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ccc;
padding:10px;
text-align:left;
}

th{
background:green;
color:white;
}

tr:hover{
background:#f1f1f1;
}

.status{
font-weight:bold;
}

.resolved{
color:green;
}

.pending{
color:red;
}

</style>

</head>

<body>

<div class="container">

<h1>🌾 Farmer Complaint Status</h1>

<table id="casesTable">

<thead>

<tr>

<th>Crop</th>
<th>Pest Type</th>
<th>Problem</th>
<th>Status</th>
<th>Officer Suggestion</th>
<th>Treatment Procedure</th>

</tr>

</thead>

<tbody></tbody>

</table>

</div>

<script>

const tableBody = document.querySelector("#casesTable tbody");

let cases = JSON.parse(localStorage.getItem("cases")) || [];

function renderCases(){

tableBody.innerHTML="";

cases.forEach(c => {

let statusClass = c.status === "Resolved" ? "resolved" : "pending";

let row = document.createElement("tr");

row.innerHTML = `

<td>${c.crop || ""}</td>
<td>${c.pestType || ""}</td>
<td>${c.problem || ""}</td>

<td class="status ${statusClass}">
${c.status || "Pending"}
</td>

<td>
${c.suggestion ? c.suggestion : "Waiting for officer response"}
</td>

<td>
${c.procedure ? c.procedure : "Waiting for officer response"}
</td>

`;

tableBody.appendChild(row);

});

}

renderCases();

</script>

</body>
</html>
