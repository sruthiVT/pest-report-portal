<!DOCTYPE html>
<html>
<head>
<title>Farmer Pest Report Portal</title>

<style>
body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
padding:40px;
}

form{
background:white;
padding:20px;
border-radius:10px;
width:350px;
margin:auto;
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0;
}

button{
background:green;
color:white;
padding:10px;
border:none;
cursor:pointer;
}

#successMessage{
display:none;
color:green;
font-size:20px;
margin-top:20px;
}
</style>

</head>

<body>

<h2>Farmer Pest Reporting Portal</h2>

<form id="pestForm">

<input type="text" name="name" placeholder="Farmer Name" required>

<input type="email" name="email" placeholder="Email" required>

<input type="text" name="location" placeholder="Farm Location" required>

<textarea name="pest" placeholder="Describe Pest Issue"></textarea>

<button type="submit">Submit Report</button>

</form>

<div id="successMessage">
✅ Report Submitted Successfully!  
Confirmation email sent.
</div>

<script>

document.getElementById("pestForm").addEventListener("submit", function(e){

e.preventDefault();

const data = {
name: this.name.value,
email: this.email.value,
location: this.location.value,
pest: this.pest.value
};

fetch("https://YOUR-SALESFORCE-API-ENDPOINT",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
})
.then(res=>res.json())
.then(result=>{

document.getElementById("pestForm").style.display="none";
document.getElementById("successMessage").style.display="block";

})
.catch(err=>{
alert("Error submitting report");
});

});

</script>

</body>
</html>
