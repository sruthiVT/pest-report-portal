<!DOCTYPE html>
<html>
<head>
<title>Farmer Login</title>
<style>
body{
  margin:0;
  font-family: Arial;
  background:url("https://images.unsplash.com/photo-1500382017468-9049fed747ef") no-repeat center center/cover;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.header{
  background:white;
  width: 100%;
  padding:15px 40px;
  display:flex;
  align-items:center;
  box-shadow:0 2px 5px rgba(0,0,0,0.2);
  margin-bottom:20px;
}

.logo{
  width:50px;
  margin-right:15px;
}

.title{
  font-size:22px;
  font-weight:bold;
  color:#f4511e;
}

.subtitle{
  font-size:14px;
  color:#2e7d32;
}

.container{
  width:400px;
  background:white;
  padding:30px;
  border-radius:10px;
  box-shadow:0 0 15px rgba(0,0,0,0.3);
  text-align:center;
}

input, button{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:5px;
  border:1px solid #ccc;
}

button{
  background:green;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#006400;
}
</style>
</head>
<body>

<!-- Header with logo and title -->
<div class="header">
  <img src="https://cdn-icons-png.flaticon.com/512/628/628283.png" class="logo">
  <div>
    <div class="title">SMART MONITORING PEST SYSTEM</div>
    <div class="subtitle">Agriculture Department</div>
  </div>
</div>

<!-- Farmer Login Form -->
<div class="container">
<h2>🌾 Farmer Login</h2>
<input id="farmerName" type="text" placeholder="Name" required>
<input id="farmerEmail" type="email" placeholder="Email" required>
<input id="farmerPhone" type="text" placeholder="Phone Number" required>
<button onclick="loginFarmer()">Login & Next</button>
</div>

<script>
function loginFarmer(){
  const name = document.getElementById("farmerName").value;
  const email = document.getElementById("farmerEmail").value;
  const phone = document.getElementById("farmerPhone").value;

  if(!name || !email || !phone){
    alert("Please fill all fields!");
    return;
  }

  // Save farmer details in localStorage
  localStorage.setItem("farmerName", name);
  localStorage.setItem("farmerEmail", email);
  localStorage.setItem("farmerPhone", phone);

  // Redirect to pest details page
  window.location.href = "pestreport.html";
}
</script>

</body>
</html>
