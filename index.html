<!DOCTYPE html>
<html>
<head>
<title>Farmer Login</title>
<style>
body{
  margin:0;
  font-family: Arial;
  background:url("https://images.unsplash.com/photo-1500382017468-9049fed747ef") no-repeat center center/cover;
  background-size: cover;
  min-height:100vh;
}

/* Header stays at top */
.header{
  background:white;
  width: 100%;
  padding:15px 40px;
  display:flex;
  align-items:center;
  box-shadow:0 2px 5px rgba(0,0,0,0.2);
  position: fixed;
  top:0;
  left:0;
  z-index: 1000;
}

.logo{
  width:50px;
  margin-right:15px;
}

.title{
  font-size:22px;
  font-weight:bold;
  color:#f4511e;
}

.subtitle{
  font-size:14px;
  color:#2e7d32;
}

/* Container for login form */
.container{
  width:400px;
  background:white;
  padding:30px;
  border-radius:10px;
  box-shadow:0 0 15px rgba(0,0,0,0.3);
  text-align:center;
  margin: 150px auto 0 auto; /* push below header */
}

select, input, button{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:5px;
  border:1px solid #ccc;
}

button{
  background:green;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#006400;
}
</style>
</head>
<body>

<!-- Header with logo and title -->
<div class="header">
  <img src="https://cdn-icons-png.flaticon.com/512/628/628283.png" class="logo">
  <div>
    <div class="title">SMART MONITORING PEST SYSTEM</div>
    <div class="subtitle">Agriculture Department</div>
  </div>
</div>

<!-- Farmer Login Form -->
<div class="container">
  <h2 id="formTitle">🌾 Farmer Login</h2>

  <!-- Language selection -->
  <select id="languageSelect" onchange="setLanguage(this.value)">
    <option value="english">English</option>
    <option value="tamil">தமிழ்</option>
  </select>

  <input id="farmerName" type="text" placeholder="Name" required>
  <input id="farmerEmail" type="email" placeholder="Email" required>
  <input id="farmerPhone" type="text" placeholder="Phone Number" required>
  <button onclick="loginFarmer()" id="loginBtn">Login & Next</button>
</div>

<script>
// Language translations
const translations = {
  english:{
    formTitle:"🌾 Farmer Login",
    name:"Name",
    email:"Email",
    phone:"Phone Number",
    loginBtn:"Login & Next"
  },
  tamil:{
    formTitle:"🌾 விவசாயி உள்நுழைவு",
    name:"பெயர்",
    email:"மின்னஞ்சல்",
    phone:"தொலைபேசி எண்",
    loginBtn:"உள்நுழைவு & அடுத்தது"
  }
};

// Set language
function setLanguage(lang){
  localStorage.setItem("farmerLanguage", lang); // persist
  const t = translations[lang];
  document.getElementById("formTitle").innerText = t.formTitle;
  document.getElementById("farmerName").placeholder = t.name;
  document.getElementById("farmerEmail").placeholder = t.email;
  document.getElementById("farmerPhone").placeholder = t.phone;
  document.getElementById("loginBtn").innerText = t.loginBtn;
}

// Initialize language
setLanguage(localStorage.getItem("farmerLanguage") || "english");

// Login function
function loginFarmer(){
  const name = document.getElementById("farmerName").value;
  const email = document.getElementById("farmerEmail").value;
  const phone = document.getElementById("farmerPhone").value;

  if(!name || !email || !phone){
    alert(localStorage.getItem("farmerLanguage") === "tamil" ? "அனைத்து புலங்களையும் நிரப்பவும்!" : "Please fill all fields!");
    return;
  }

  localStorage.setItem("farmerName", name);
  localStorage.setItem("farmerEmail", email);
  localStorage.setItem("farmerPhone", phone);

  // Redirect to pest report page
  window.location.href = "pestreport.html";
}
</script>

</body>
</html>
