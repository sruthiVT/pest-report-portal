<!DOCTYPE html>
<html>
<head>
<title>Farmer Pest Report Portal</title>

<meta http-equiv="Content-type" content="text/html; charset=UTF-8">

<style>

body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
padding:40px;
}

form{
background:white;
padding:25px;
border-radius:10px;
width:420px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,textarea,select{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:green;
color:white;
padding:12px;
border:none;
border-radius:5px;
width:100%;
font-size:16px;
cursor:pointer;
}

h2{
margin-bottom:20px;
}

</style>

</head>

<body>

<h2>🌾 Farmer Pest Reporting Portal <br> விவசாயி பூச்சி புகார் பதிவு</h2>

<form id="pestForm"
action="https://webto.salesforce.com/servlet/servlet.WebToCase?encoding=UTF-8&orgId=00DdM00000iSfdB"
method="POST">

<input type="hidden" name="orgid" value="00DdM00000iSfdB">

<input type="hidden" name="retURL" value="https://sruthivt.github.io/pest-report-portal">

<!-- Farmer Name -->

<label>Farmer Name / விவசாயி பெயர்</label>
<input id="name" name="name" type="text" required>

<!-- Email -->

<label>Email / மின்னஞ்சல்</label>
<input id="email" name="email" type="email" required>

<!-- Phone -->

<label>Phone / தொலைபேசி</label>
<input id="phone" name="phone" type="text">


<!-- Village -->

<label>Village / கிராமம்</label>

<select name="village">

<option value="">Select Village / கிராமத்தை தேர்வு செய்யவும்</option>

<option value="Perundurai">Perundurai / பெருந்துறை</option>
<option value="Chennimalai">Chennimalai / சென்னிமலை</option>
<option value="Kodumudi">Kodumudi / கொடுமுடி</option>
<option value="Bhavani">Bhavani / பவானி</option>
<option value="Gobichettipalayam">Gobichettipalayam / கோபிசெட்டிபாளையம்</option>
<option value="Sathyamangalam">Sathyamangalam / சத்தியமங்கலம்</option>
<option value="Anthiyur">Anthiyur / அந்தியூர்</option>
<option value="Nambiyur">Nambiyur / நம்பியூர்</option>
<option value="Thalavadi">Thalavadi / தாளவாடி</option>

<option value="Pollachi">Pollachi / பொள்ளாச்சி</option>
<option value="Kinathukadavu">Kinathukadavu / கிணத்துக்கடவு</option>
<option value="Sulur">Sulur / சூலூர்</option>
<option value="Annur">Annur / அன்னூர்</option>
<option value="Mettupalayam">Mettupalayam / மேட்டுப்பாளையம்</option>

<option value="Attur">Attur / ஆத்தூர்</option>
<option value="Omalur">Omalur / ஓமலூர்</option>
<option value="Edappadi">Edappadi / எடப்பாடி</option>
<option value="Mettur">Mettur / மேட்டூர்</option>

<option value="Dharapuram">Dharapuram / தராபுரம்</option>
<option value="Kangeyam">Kangeyam / காங்கேயம்</option>
<option value="Avinashi">Avinashi / அவிநாசி</option>
<option value="Udumalpet">Udumalpet / உடுமலைப்பேட்டை</option>

<option value="Other">Other / மற்றவை</option>

</select>


<!-- Pest Type -->

<label>Pest Type / பூச்சி வகை</label>

<select name="subject">

<option value="">Select Pest / பூச்சியை தேர்வு செய்யவும்</option>

<option value="Brown Plant Hopper">Brown Plant Hopper / பழுப்பு தாவர தாண்டி</option>
<option value="Stem Borer">Stem Borer / தண்டு துளைப்பான்</option>
<option value="Leaf Folder">Leaf Folder / இலை மடிப்பான்</option>
<option value="Aphids">Aphids / அஃபிட்ஸ்</option>
<option value="Whitefly">Whitefly / வெள்ளை ஈ</option>
<option value="Armyworm">Armyworm / படை பூச்சி</option>
<option value="Thrips">Thrips / திரிப்ஸ்</option>
<option value="Other">Other / மற்றவை</option>

</select>

<!-- Infection Level -->

<label>Infected Level / பாதிப்பு நிலை</label>

<select name="infected_level">

<option value="">Select Level / நிலையை தேர்வு செய்யவும்</option>

<option value="Low">Low / குறைவு</option>
<option value="Medium">Medium / நடுத்தரம்</option>
<option value="High">High / அதிகம்</option>

</select>

<!-- Photo Upload -->

<label>Upload Crop Photo / பயிர் புகைப்படம் பதிவேற்றம்</label>

<input type="file" id="pestImage" accept="image/*">

<!-- Hidden field for image URL -->

<input type="hidden" id="imageURL" name="00NdM000022J56f">

<!-- Description -->

<label>Pest Description / பூச்சி விவரம்</label>

<textarea name="description"></textarea>

<input type="hidden" name="external" value="1">

<button type="submit">Submit Report / புகாரை சமர்ப்பிக்கவும்</button>

</form>


<script>

const apiKey = "9d9a3054573db11bcb75e2a3da97e3de";

document.getElementById("pestForm").addEventListener("submit", async function(e){

e.preventDefault();

const fileInput = document.getElementById("pestImage");

const file = fileInput.files[0];

if(file){

const formData = new FormData();

formData.append("image", file);

const response = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`,{

method:"POST",
body:formData

});

const data = await response.json();

document.getElementById("imageURL").value = data.data.url;

}

this.submit();

});

</script>

</body>
</html>
