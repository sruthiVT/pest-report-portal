<!DOCTYPE html>
<html>
<head>

<title>Farmer Portal </title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#6bbf3f,#b8e994);

display:flex;
justify-content:center;
align-items:center;
}

.phone{
width:360px;

background:#4CAF50;

}

</style>

<script>

function saveLanguage(){

let lang=document.getElementById("language").value;
localStorage.setItem("farmerLanguage",lang);

}

</script>

</head>

<body>

<div class="phone">

<div class="screen">

<h2>🌾 Farmer Login</h2>

<select id="language">
<option value="english">English</option>
<option value="tamil">தமிழ்</option>
</select>

<form action="report.html" onsubmit="saveLanguage()">

<input type="text" placeholder="Farmer Name" required>

<input type="email" placeholder="Email" required>

<input type="text" placeholder="Phone Number" required>

<button type="submit">Login</button>

</form>

</div>

</div>

</body>
