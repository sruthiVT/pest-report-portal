<!DOCTYPE html>
<html>
<head>

<title>Smart Monitoring Pest System</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("https://images.unsplash.com/photo-1500382017468-9049fed747ef") no-repeat center center/cover;
height:100vh;
}

/* HEADER */

.header{
background:white;
padding:15px 40px;
display:flex;
align-items:center;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.title{
font-size:22px;
font-weight:bold;
color:#f4511e;
}

.subtitle{
font-size:14px;
color:#2e7d32;
}

/* CENTER CARD */

.container{
display:flex;
justify-content:center;
align-items:center;
height:80vh;
}

.card{
background:white;
padding:30px;
width:350px;
border-radius:6px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
text-align:center;
}

input,select{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:4px;
}

button{
background:#1976d2;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#0d47a1;
}

</style>

<script>

function saveLanguage(){

let lang=document.getElementById("language").value;
localStorage.setItem("farmerLanguage",lang);

}

</script>

</head>

<body>

<div class="header">

<div>

<div class="title">SMART MONITORING PEST SYSTEM</div>
<div class="subtitle">Agriculture Department</div>

</div>

</div>

<div class="container">

<div class="card">

<h2>Log in</h2>

<select id="language">
<option value="english">English</option>
<option value="tamil">தமிழ்</option>
</select>

<form action="report.html" onsubmit="saveLanguage()">

<input type="text" placeholder="Farmer Name" required>

<input type="email" placeholder="Email" required>

<input type="text" placeholder="Phone Number" required>

<button type="submit">Login</button>

</form>

</div>

</div>

</body>
</html>
