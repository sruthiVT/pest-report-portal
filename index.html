<!DOCTYPE html>
<html>
<head>
<title>SMART MONITORING PEST SYSTEM</title>
<style>
body{
  margin:0;
  font-family: Arial;
  background:url("https://images.unsplash.com/photo-1500382017468-9049fed747ef") no-repeat center center/cover;
  background-size: cover;
  min-height:100vh;
}

/* Header */
.header{
  background:white;
  width: 100%;
  padding:15px 40px;
  display:flex;
  align-items:center;
  box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.logo{
  width:50px;
  margin-right:15px;
}

.title{
  font-size:22px;
  font-weight:bold;
  color:#f4511e;
}

.subtitle{
  font-size:14px;
  color:#2e7d32;
}

/* Container for role boxes */
.container{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:40px;
  margin:40px auto;
}

/* Individual role box */
.roleBox{
  width:350px;
  background:white;
  padding:30px;
  border-radius:10px;
  box-shadow:0 0 15px rgba(0,0,0,0.3);
  text-align:center;
}

input, select, button{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:5px;
  border:1px solid #ccc;
}

button{
  background:green;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#006400;
}
</style>
</head>
<body>

<div class="header">
  <img src="https://cdn-icons-png.flaticon.com/512/628/628283.png" class="logo">
  <div>
    <div class="title">SMART MONITORING PEST SYSTEM</div>
    <div class="subtitle">Agriculture Department</div>
  </div>
</div>

<div class="container">

  <!-- Admin Box -->
  <div class="roleBox" id="adminBox">
    <h2 id="adminTitle">🌾 Admin / Officer Login</h2>
    <select id="adminLanguage" onchange="setLanguage(this.value)">
      <option value="english">English</option>
      <option value="tamil">தமிழ்</option>
    </select>
    <input id="adminName" type="text" placeholder="Name">
    <input id="adminEmail" type="email" placeholder="Email">
    <input id="adminPhone" type="text" placeholder="Phone Number">
    <button onclick="loginAdmin()" id="adminBtn">Login</button>
  </div>

  <!-- Farmer Box -->
  <div class="roleBox" id="farmerBox">
    <h2 id="farmerTitle">🌾 Farmer / User Login</h2>
    <select id="farmerLanguage" onchange="setLanguage(this.value)">
      <option value="english">English</option>
      <option value="tamil">தமிழ்</option>
    </select>
    <input id="farmerName" type="text" placeholder="Name">
    <input id="farmerEmail" type="email" placeholder="Email">
    <input id="farmerPhone" type="text" placeholder="Phone Number">
    <button onclick="loginFarmer()" id="farmerBtn">Login</button>
  </div>

</div>

<script>
const translations = {
  english:{
    adminTitle:"🌾 Admin / Officer Login",
    farmerTitle:"🌾 Farmer / User Login",
    name:"Name",
    email:"Email",
    phone:"Phone Number",
    loginBtn:"Login"
  },
  tamil:{
    adminTitle:"🌾 நிர்வாகி / அலுவலர் உள்நுழைவு",
    farmerTitle:"🌾 விவசாயி / பயனர் உள்நுழைவு",
    name:"பெயர்",
    email:"மின்னஞ்சல்",
    phone:"தொலைபேசி எண்",
    loginBtn:"உள்நுழைவு"
  }
};

// set language for both boxes
function setLanguage(lang){
  localStorage.setItem("farmerLanguage", lang);
  const t = translations[lang];
  document.getElementById("adminTitle").innerText = t.adminTitle;
  document.getElementById("farmerTitle").innerText = t.farmerTitle;
  document.getElementById("adminName").placeholder = t.name;
  document.getElementById("adminEmail").placeholder = t.email;
  document.getElementById("adminPhone").placeholder = t.phone;
  document.getElementById("adminBtn").innerText = t.loginBtn;
  document.getElementById("farmerName").placeholder = t.name;
  document.getElementById("farmerEmail").placeholder = t.email;
  document.getElementById("farmerPhone").placeholder = t.phone;
  document.getElementById("farmerBtn").innerText = t.loginBtn;
}

// initialize language
setLanguage(localStorage.getItem("farmerLanguage") || "english");

// Admin login
function loginAdmin(){
  const name = document.getElementById("adminName").value;
  const email = document.getElementById("adminEmail").value;
  const phone = document.getElementById("adminPhone").value;
  if(!name || !email || !phone){ alert("Please fill all fields!"); return; }

  localStorage.setItem("userRole","admin");
  localStorage.setItem("adminName", name);
  localStorage.setItem("adminEmail", email);
  localStorage.setItem("adminPhone", phone);

  window.location.href = "admin.html";
}

// Farmer login
function loginFarmer(){
  const name = document.getElementById("farmerName").value;
  const email = document.getElementById("farmerEmail").value;
  const phone = document.getElementById("farmerPhone").value;
  if(!name || !email || !phone){ alert("Please fill all fields!"); return; }

  localStorage.setItem("userRole","farmer");
  localStorage.setItem("farmerName", name);
  localStorage.setItem("farmerEmail", email);
  localStorage.setItem("farmerPhone", phone);

  window.location.href = "pestreport.html";
}
</script>

</body>
</html>
