<!DOCTYPE html>
<html>
<head>
<title>பூச்சி கண்காணிப்பு அமைப்பு</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
padding:40px;
}

.container{
background:white;
padding:25px;
width:420px;
margin:auto;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
color:#2c3e50;
}

p{
text-align:center;
color:#555;
}

input, textarea, select{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:15px;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:#2e86de;
color:white;
padding:12px;
border:none;
width:100%;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1b4f72;
}

</style>
</head>

<body>

<div class="container">

<h2>பூச்சி கண்காணிப்பு அமைப்பு</h2>

<p>விவசாயிகள் தங்கள் பயிர்களில் உள்ள பூச்சி பிரச்சனைகளை இங்கு தெரிவிக்கலாம்.</p>

<form action="https://webto.salesforce.com/servlet/servlet.WebToCase" method="POST">

<input type="hidden" name="orgid" value="00DdM00000iSfdB">
<input type="hidden" name="retURL" value="https://sruthivt.github.io/pest-report-portal/">

<label>விவசாயியின் பெயர்</label>
<input type="text" name="name" required>

<label>தொலைபேசி எண்</label>
<input type="text" name="phone">

<label>கிராமம்</label>
<input type="text" name="subject">

<label>பூச்சி விவரம்</label>
<textarea name="description" rows="4"></textarea>

<label>பாதிப்பு அளவு</label>

<select name="priority">

<option value="Low">குறைவு</option>

<option value="Medium">நடுத்தரம்</option>

<option value="High">அதிகம்</option>

</select>

<button type="submit">பூச்சி தகவலை அனுப்பவும்</button>

</form>

</div>

</body>
</html>
