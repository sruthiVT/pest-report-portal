<!DOCTYPE html>
<html>
<head>
<title>Smart Pest Monitoring System</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
padding:40px;
}

.container{
background:white;
padding:25px;
width:420px;
margin:auto;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
color:#2c3e50;
}

input, select{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:15px;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:#2e86de;
color:white;
padding:10px;
border:none;
width:100%;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1b4f72;
}

</style>
</head>

<body>

<div class="container">

<h2>🌾 Smart Pest Monitoring System 🌾</h2>

<form id="pestForm"
action="https://webto.salesforce.com/servlet/servlet.WebToCase"
method="POST"
onsubmit="submitForm(event)">

<input type="hidden" name="orgid" value="00DdM00000iSfdB">
<input type="hidden" name="retURL" value="https://sruthivt.github.io/pest-report-portal/">

<!-- Salesforce Contact Fields -->
<input type="hidden" name="first_name" id="first_name">
<input type="hidden" name="last_name" id="last_name">

<label>Farmer Name / விவசாயி பெயர்</label>
<input type="text" id="farmer_name" required>

<label>Email / மின்னஞ்சல்</label>
<input type="email" id="email" name="email" required>

<label>Phone Number / தொலைபேசி எண்</label>
<input type="tel" id="phone" name="phone" required>

<label>Village / கிராமம்</label>
<input type="text" id="village" name="subject" required>

<label>Pest Type / பூச்சி வகை</label>
<select id="pest" name="description">

<option value="Fall Armyworm">Fall Armyworm</option>
<option value="Brown Plant Hopper">Brown Plant Hopper</option>
<option value="Stem Borer">Stem Borer</option>
<option value="Leaf Folder">Leaf Folder</option>

</select>

<label>Infected Level / பாதிப்பு அளவு</label>
<select id="level">

<option value="Low">Low</option>
<option value="Medium">Medium</option>
<option value="High">High</option>

</select>

<button type="submit">Submit Report</button>

</form>

</div>


<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>

/* Initialize EmailJS */
(function(){
emailjs.init("3oTB5lj9pKw_10I6R");
})();


function submitForm(event){

event.preventDefault();

/* Get form values */

var farmerName = document.getElementById("farmer_name").value;
var village = document.getElementById("village").value;
var phone = document.getElementById("phone").value;
var email = document.getElementById("email").value;
var pest = document.getElementById("pest").value;
var level = document.getElementById("level").value;


/* Fix Salesforce Contact Name */

document.getElementById("first_name").value = farmerName;
document.getElementById("last_name").value = farmerName;


/* Email Message */

var message =
"🌾 Smart Pest Monitoring System 🌾<br><br>" +

"விவசாயி அவர்களுக்கு வணக்கம்,<br><br>" +

"உங்கள் பூச்சி புகார் வெற்றிகரமாக சமர்ப்பிக்கப்பட்டுள்ளது.<br><br>" +

"<b>விவசாயி பெயர் :</b> " + farmerName + "<br>" +
"<b>கிராமம் :</b> " + village + "<br>" +
"<b>தொலைபேசி எண் :</b> " + phone + "<br>" +
"<b>மின்னஞ்சல் :</b> " + email + "<br>" +
"<b>பூச்சி வகை :</b> " + pest + "<br>" +
"<b>பாதிப்பு அளவு :</b> " + level + "<br><br>" +

"எங்கள் வேளாண்மை அதிகாரி உங்கள் புகாரை விரைவில் பரிசீலிப்பார்.<br><br>" +

"Smart Pest Monitoring System பயன்படுத்தியதற்கு நன்றி.<br><br>" +

"--------------------------------------<br><br>" +

"<b>Dear Farmer,</b><br><br>" +

"Your pest report has been successfully submitted.<br><br>" +

"<b>Farmer Name :</b> " + farmerName + "<br>" +
"<b>Village :</b> " + village + "<br>" +
"<b>Phone Number :</b> " + phone + "<br>" +
"<b>Email :</b> " + email + "<br>" +
"<b>Pest Type :</b> " + pest + "<br>" +
"<b>Infected Level :</b> " + level + "<br><br>" +

"Our Agriculture Officer will review your complaint soon.<br><br>" +

"Thank you<br>" +
"Agriculture Support Group";


/* Send Email */

emailjs.send("service_5be3jfq","template_retc0al",{

email: email,
message: message

}).then(function(){

alert("Report submitted successfully!");

/* Submit form to Salesforce */

document.getElementById("pestForm").submit();

});

}

</script>

</body>
</html>
