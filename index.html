<!DOCTYPE html>
<html>
<head>
<title>Smart Monitoring Pest System</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:url("https://images.unsplash.com/photo-1500382017468-9049fed747ef") no-repeat center center/cover;
  height:100vh;
}

.header{
  background:white;
  padding:15px 40px;
  display:flex;
  align-items:center;
  box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.logo{
  width:50px;
  margin-right:15px;
}

.title{
  font-size:22px;
  font-weight:bold;
  color:#f4511e;
}

.subtitle{
  font-size:14px;
  color:#2e7d32;
}

.container{
  display:flex;
  justify-content:center;
  align-items:center;
  height:80vh;
}

.card{
  background:white;
  padding:30px;
  width:350px;
  border-radius:6px;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
  text-align:center;
}

input,select,textarea{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:1px solid #ccc;
  border-radius:4px;
}

button{
  background:#1976d2;
  color:white;
  border:none;
  padding:10px;
  width:100%;
  border-radius:4px;
  cursor:pointer;
}

button:hover{
  background:#0d47a1;
}

#adminBtn, #userBtn {
  border-radius:8px;
  box-shadow:0 2px 5px rgba(0,0,0,0.2);
  font-weight:bold;
}
</style>
<script>
function showForm(role){
  document.getElementById('roleSelection').style.display='none';
  if(role==='admin'){
    document.getElementById('adminForm').style.display='block';
  }else{
    document.getElementById('userForm').style.display='block';
  }
}

/* Farmer login and case submission */
function loginUser(){
  const name = document.getElementById("userName").value;
  const email = document.getElementById("userEmail").value;
  const phone = document.getElementById("userPhone").value;
  const crop = document.getElementById("userCrop").value;
  const problem = document.getElementById("userProblem").value;

  if(!name || !email || !phone || !crop || !problem){
    alert("Please fill all fields!");
    return;
  }

  // Get existing cases
  let cases = JSON.parse(localStorage.getItem("cases")) || [];
  cases.push({
    name, email, phone, crop, problem, status: "Pending"
  });
  localStorage.setItem("cases", JSON.stringify(cases));

  localStorage.setItem("userRole","user");
  localStorage.setItem("farmerName",name);

  window.location.href="farmercases.html";
}

/* Admin login */
function loginAdmin(){
  const name = document.getElementById("adminName").value;
  const email = document.getElementById("adminEmail").value;
  const phone = document.getElementById("adminPhone").value;

  if(!name || !email || !phone){
    alert("Please fill all fields!");
    return;
  }

  localStorage.setItem("userRole","admin");
  localStorage.setItem("adminName",name);

  window.location.href="admin.html";
}
</script>
</head>
<body>

<div class="header">
<img src="https://cdn-icons-png.flaticon.com/512/628/628283.png" class="logo">
<div>
<div class="title">SMART MONITORING PEST SYSTEM</div>
<div class="subtitle">Agriculture Department</div>
</div>
</div>

<!-- ROLE SELECTION -->
<div class="container" id="roleSelection">
<div class="card">
<h2>Select Role</h2>
<div style="display:flex; justify-content:space-between; margin-top:20px;">
<button id="adminBtn" style="width:48%; padding:20px;" onclick="showForm('admin')">Admin / Officer</button>
<button id="userBtn" style="width:48%; padding:20px;" onclick="showForm('user')">Farmer / User</button>
</div>
</div>
</div>

<!-- ADMIN LOGIN -->
<div class="container" id="adminForm" style="display:none;">
<div class="card">
<h2>Officer Login</h2>
<input id="adminName" type="text" placeholder="Name" required>
<input id="adminEmail" type="email" placeholder="Email" required>
<input id="adminPhone" type="text" placeholder="Phone Number" required>
<button onclick="loginAdmin()" id="adminLoginBtn">Login</button>
</div>
</div>

<!-- FARMER LOGIN -->
<div class="container" id="userForm" style="display:none;">
<div class="card">
<h2>Farmer Login & Submit Pest Details</h2>
<input id="userName" type="text" placeholder="Farmer Name" required>
<input id="userEmail" type="email" placeholder="Email" required>
<input id="userPhone" type="text" placeholder="Phone Number" required>
<input id="userCrop" type="text" placeholder="Crop Name" required>
<textarea id="userProblem" placeholder="Pest Problem / Description" required></textarea>
<button onclick="loginUser()" id="userLoginBtn">Submit & Login</button>
</div>
</div>

</body>
</html>
