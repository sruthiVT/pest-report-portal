<!DOCTYPE html>
<html>
<head>
<title>SMART MONITORING PEST SYSTEM</title>
<style>
body{
  margin:0;
  font-family: Arial;
  background:url("https://images.unsplash.com/photo-1500382017468-9049fed747ef") no-repeat center center/cover;
  background-size: cover;
  min-height:100vh;
}

.header{
  background:white;
  width: 100%;
  padding:15px 40px;
  display:flex;
  align-items:center;
  box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.logo{
  width:50px;
  margin-right:15px;
}

.title{
  font-size:22px;
  font-weight:bold;
  color:#f4511e;
}

.subtitle{
  font-size:14px;
  color:#2e7d32;
}

.container{
  width:400px;
  background:white;
  padding:30px;
  border-radius:10px;
  box-shadow:0 0 15px rgba(0,0,0,0.3);
  text-align:center;
  margin: 40px auto;
}

input, select, button{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:5px;
  border:1px solid #ccc;
}

button{
  background:green;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#006400;
}
</style>
</head>
<body>

<div class="header">
  <img src="https://cdn-icons-png.flaticon.com/512/628/628283.png" class="logo">
  <div>
    <div class="title">SMART MONITORING PEST SYSTEM</div>
    <div class="subtitle">Agriculture Department</div>
  </div>
</div>

<div class="container">
<h2 id="loginTitle">🌾 Farmer / Admin Login</h2>

<select id="languageSelect" onchange="setLanguage(this.value)">
  <option value="english">English</option>
  <option value="tamil">தமிழ்</option>
</select>

<input id="userName" type="text" placeholder="Name" required>
<input id="userEmail" type="email" placeholder="Email" required>
<input id="userPhone" type="text" placeholder="Phone Number" required>

<select id="roleSelect">
  <option value="farmer">Farmer</option>
  <option value="admin">Admin</option>
</select>

<button onclick="loginUser()" id="loginBtn">Login & Next</button>
</div>

<script>
const translations = {
  english:{
    loginTitle:"🌾 Farmer / Admin Login",
    userName:"Name",
    userEmail:"Email",
    userPhone:"Phone Number",
    roleSelect:"Select Role",
    loginBtn:"Login & Next"
  },
  tamil:{
    loginTitle:"🌾 விவசாயி / நிர்வாகி உள்நுழைவு",
    userName:"பெயர்",
    userEmail:"மின்னஞ்சல்",
    userPhone:"தொலைபேசி எண்",
    roleSelect:"பங்கு தேர்வு செய்க",
    loginBtn:"உள்நுழைவு"
  }
};

function setLanguage(lang){
  localStorage.setItem("farmerLanguage", lang);
  const t = translations[lang];
  document.getElementById("loginTitle").innerText = t.loginTitle;
  document.getElementById("userName").placeholder = t.userName;
  document.getElementById("userEmail").placeholder = t.userEmail;
  document.getElementById("userPhone").placeholder = t.userPhone;
  document.getElementById("loginBtn").innerText = t.loginBtn;
}

setLanguage(localStorage.getItem("farmerLanguage") || "english");

function loginUser(){
  const name = document.getElementById("userName").value;
  const email = document.getElementById("userEmail").value;
  const phone = document.getElementById("userPhone").value;
  const role = document.getElementById("roleSelect").value;

  if(!name || !email || !phone){
    alert("Please fill all fields!");
    return;
  }

  localStorage.setItem("userName", name);
  localStorage.setItem("userEmail", email);
  localStorage.setItem("userPhone", phone);
  localStorage.setItem("userRole", role);

  // Redirect based on role
  if(role==="farmer"){
    window.location.href = "pestreport.html";
  } else {
    window.location.href = "admin.html";
  }
}
</script>

</body>
</html>
